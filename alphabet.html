<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alfabetul Englez · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050818;--blue:#00b4ff;--purple:#8b5cf6;--teal:#00e5cc;--frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09);}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(0,180,255,.15),transparent 65%),radial-gradient(ellipse 55% 45% at 80% 80%,rgba(139,92,246,.15),transparent 60%),#050818}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:13px 20px;display:flex;align-items:center;gap:12px;background:rgba(5,8,24,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);transition:all .2s;flex-shrink:0}
.back:hover{border-color:rgba(0,180,255,.4);background:rgba(0,180,255,.1)}
.hdr-t{font-size:14px;font-weight:700;flex:1}
.lang-sw{display:flex;gap:3px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;padding:3px}
.lb{font-size:10px;font-weight:700;padding:4px 10px;border-radius:16px;border:none;background:none;color:var(--frost2);cursor:pointer;transition:all .2s;letter-spacing:.08em}
.lb.on{background:var(--blue);color:#fff}
.pbar{height:3px;background:rgba(255,255,255,.07);position:fixed;top:62px;left:0;right:0;z-index:99}
.pfill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue),var(--teal));transition:width .4s ease}
.main{padding:82px 20px 100px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;position:relative;z-index:10;gap:16px}
.lcard{width:100%;max-width:420px;background:var(--glass);border:1px solid var(--border);border-radius:32px;padding:36px 28px;backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;animation:cin .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cin{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.lcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 50%);pointer-events:none}
.lbig{font-size:clamp(96px,22vw,144px);font-weight:900;line-height:1;letter-spacing:-.03em;background:linear-gradient(130deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,180,255,.45));margin-bottom:4px;user-select:none}
.lname{font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--frost3);margin-bottom:22px}
.phbox{width:100%;background:rgba(0,180,255,.07);border:1px solid rgba(0,180,255,.18);border-radius:18px;padding:16px 20px;margin-bottom:22px}
.phlbl{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);opacity:.7;margin-bottom:6px}
.phtext{font-size:26px;font-weight:800;letter-spacing:.08em;color:var(--blue);text-shadow:0 0 20px rgba(0,180,255,.35)}
.phtip{font-size:12px;color:var(--frost2);margin-top:7px;line-height:1.55}
.abtn{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 28px rgba(0,180,255,.4);transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;margin-bottom:24px}
.abtn:hover{transform:scale(1.12);box-shadow:0 0 50px rgba(0,180,255,.6)}
.abtn:active{transform:scale(.95)}
.abtn.playing{animation:abp 1s ease-in-out infinite}
@keyframes abp{0%,100%{box-shadow:0 0 28px rgba(0,180,255,.4)}50%{box-shadow:0 0 60px rgba(0,180,255,.85),0 0 80px rgba(0,229,204,.4)}}
.exlbl{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--frost3);margin-bottom:12px;align-self:flex-start}
.exs{display:flex;gap:10px;width:100%}
.exc{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .25s;text-align:center}
.exc:hover{border-color:rgba(0,180,255,.28);background:rgba(0,180,255,.08);transform:translateY(-2px)}
.exem{font-size:28px;margin-bottom:6px}
.exw{font-size:14px;font-weight:700;margin-bottom:2px}
.exph{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.05em;margin-bottom:3px}
.exro{font-size:11px;color:var(--frost2)}
.navrow{width:100%;max-width:420px;display:flex;gap:10px}
.nbtn{flex:1;padding:15px;border-radius:16px;border:1px solid var(--border);background:var(--glass);color:var(--frost);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:6px}
.nbtn:hover{border-color:rgba(0,180,255,.35);background:rgba(0,180,255,.08)}
.nbtn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.nbtn.primary{background:linear-gradient(135deg,var(--blue),var(--teal));border:none;box-shadow:0 0 20px rgba(0,180,255,.3)}
.nbtn.primary:hover{box-shadow:0 0 40px rgba(0,180,255,.55)}
.lgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;width:100%;max-width:420px;padding:4px 0}
.gl{aspect-ratio:1;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--frost2)}
.gl:hover{border-color:rgba(0,180,255,.35);color:var(--blue)}
.gl.done{background:rgba(0,229,204,.10);border-color:rgba(0,229,204,.28);color:var(--teal)}
.gl.active{background:rgba(0,180,255,.16);border-color:rgba(0,180,255,.5);color:var(--frost);box-shadow:0 0 14px rgba(0,180,255,.28)}
</style>
</head>
<body>
<div class="bg"></div>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t" id="hdr-t">Alfabetul Englez</div>
  <div class="lang-sw">
    <button class="lb on" id="btn-ro" onclick="setLang('ro')">RO</button>
    <button class="lb" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</header>
<div class="pbar"><div class="pfill" id="pfill" style="width:3.8%"></div></div>
<main class="main">
  <div class="lcard" id="card">
    <div class="lbig" id="lbig">A</div>
    <div class="lname" id="lname">Litera A</div>
    <div class="phbox">
      <div class="phlbl" id="phlbl">Pronunță în română</div>
      <div class="phtext" id="phtext"></div>
      <div class="phtip" id="phtip"></div>
    </div>
    <button class="abtn" id="abtn" onclick="speak()">🔊</button>
    <div class="exlbl" id="exlbl">Exemple</div>
    <div class="exs" id="exs"></div>
  </div>
  <div class="navrow">
    <button class="nbtn" id="bprev" onclick="go(-1)">← <span id="tprev">Anterior</span></button>
    <button class="nbtn primary" id="bnext" onclick="go(1)"><span id="tnext">Următor</span> →</button>
  </div>
  <div class="lgrid" id="lgrid"></div>
</main>
<script>
const A=[
  {l:'A',ph:'EI',ro:'Ca în "hey" fără "h". Deschide gura pe larg.',en:'Like "ay" in "say" or "hey".',ex:[{w:'Apple',t:'Măr',e:'🍎',p:'A-PL'},{w:'Airplane',t:'Avion',e:'✈️',p:'EIR-PLEIN'}]},
  {l:'B',ph:'BI',ro:'Ca "b" în română, identic.',en:'Same as Romanian "b".',ex:[{w:'Ball',t:'Minge',e:'⚽',p:'BOL'},{w:'Book',t:'Carte',e:'📚',p:'BUK'}]},
  {l:'C',ph:'SI',ro:'Numele literei sună "si". În cuvinte poate fi "k" (cat) sau "s" (city).',en:'Letter name sounds "see". In words: "k" (cat) or "s" (city).',ex:[{w:'Cat',t:'Pisică',e:'🐱',p:'KAT'},{w:'City',t:'Oraș',e:'🏙️',p:'SI-TI'}]},
  {l:'D',ph:'DI',ro:'Ca "d" în română, identic.',en:'Same as Romanian "d".',ex:[{w:'Dog',t:'Câine',e:'🐶',p:'DOG'},{w:'Door',t:'Ușă',e:'🚪',p:'DOR'}]},
  {l:'E',ph:'I',ro:'Ca "i" lung în română. Scurt și clar.',en:'Like "ee" in "see".',ex:[{w:'Egg',t:'Ou',e:'🥚',p:'EG'},{w:'Elephant',t:'Elefant',e:'🐘',p:'ELE-FANT'}]},
  {l:'F',ph:'EF',ro:'Dinții de sus pe buza de jos, sufli aer. Ca "f" românesc.',en:'Upper teeth on lower lip, blow air.',ex:[{w:'Fish',t:'Pește',e:'🐟',p:'FIȘ'},{w:'Flower',t:'Floare',e:'🌸',p:'FLAUR'}]},
  {l:'G',ph:'GI',ro:'Ca "g" în "get", mereu dur. Nu "j"!',en:'Hard "g" as in "go", never soft.',ex:[{w:'Green',t:'Verde',e:'🟢',p:'GRIN'},{w:'Girl',t:'Fată',e:'👧',p:'GÂRL'}]},
  {l:'H',ph:'EICH',ro:'O aspirație ușoară, ca la "h" românesc.',en:'A soft breath of air, like exhaling.',ex:[{w:'House',t:'Casă',e:'🏠',p:'HAUS'},{w:'Hello',t:'Bună',e:'👋',p:'HELOU'}]},
  {l:'I',ph:'AI',ro:'Ca "ai" în română, ca un "oftat".',en:'Like "eye" or the word "I".',ex:[{w:'Ice',t:'Gheață',e:'🧊',p:'AIS'},{w:'Island',t:'Insulă',e:'🏝️',p:'AI-LAND'}]},
  {l:'J',ph:'DJEI',ro:'Ca "dj". Nu există "j" românesc în engleză!',en:'Like "j" in "jar" or "judge".',ex:[{w:'Juice',t:'Suc',e:'🧃',p:'DJUS'},{w:'Jump',t:'Salt',e:'🦘',p:'DJAMP'}]},
  {l:'K',ph:'KEI',ro:'Ca "k" sau "c" dur în română.',en:'Like "k" in "kid" or "c" in "car".',ex:[{w:'King',t:'Rege',e:'👑',p:'KING'},{w:'Key',t:'Cheie',e:'🔑',p:'KI'}]},
  {l:'L',ph:'EL',ro:'Ca "l" în română, identic.',en:'Same as Romanian "l".',ex:[{w:'Lion',t:'Leu',e:'🦁',p:'LAION'},{w:'Love',t:'Dragoste',e:'❤️',p:'LAV'}]},
  {l:'M',ph:'EM',ro:'Ca "m" în română, identic.',en:'Same as Romanian "m".',ex:[{w:'Moon',t:'Lună',e:'🌙',p:'MUN'},{w:'Mother',t:'Mamă',e:'👩',p:'MADER'}]},
  {l:'N',ph:'EN',ro:'Ca "n" în română, identic.',en:'Same as Romanian "n".',ex:[{w:'Night',t:'Noapte',e:'🌃',p:'NAIT'},{w:'Name',t:'Nume',e:'📛',p:'NEIM'}]},
  {l:'O',ph:'OU',ro:'Ca "ou" în română, buzele rotunjite.',en:'Like "o" in "go" or "no".',ex:[{w:'Orange',t:'Portocală',e:'🍊',p:'ORINJ'},{w:'Open',t:'Deschis',e:'🔓',p:'OUPEN'}]},
  {l:'P',ph:'PI',ro:'Ca "p" în română, cu o mică aspirație.',en:'Like "p" with a small puff of air.',ex:[{w:'Pizza',t:'Pizza',e:'🍕',p:'PITSA'},{w:'Phone',t:'Telefon',e:'📱',p:'FOUN'}]},
  {l:'Q',ph:'CHIUU',ro:'Mereu urmat de "u". Sună ca "kw".',en:'Always followed by "u", sounds like "kw".',ex:[{w:'Queen',t:'Regină',e:'👸',p:'KUIN'},{w:'Question',t:'Întrebare',e:'❓',p:'KUESCION'}]},
  {l:'R',ph:'AR',ro:'NU rula R-ul! Ridică ușor vârful limbii spre cer, fără să atingi palatul.',en:'Do NOT roll the R! Curl tongue tip slightly back.',ex:[{w:'Rain',t:'Ploaie',e:'🌧️',p:'REIN'},{w:'Red',t:'Roșu',e:'🔴',p:'RED'}]},
  {l:'S',ph:'ES',ro:'Ca "s" în română, identic.',en:'Same as Romanian "s".',ex:[{w:'Sun',t:'Soare',e:'☀️',p:'SAN'},{w:'Star',t:'Stea',e:'⭐',p:'STAR'}]},
  {l:'T',ph:'TI',ro:'Ca "t" în română, cu o mică aspirație.',en:'Like "t" with a small puff of air.',ex:[{w:'Tree',t:'Copac',e:'🌳',p:'TRI'},{w:'Time',t:'Timp',e:'⏰',p:'TAIM'}]},
  {l:'U',ph:'IU',ro:'Ca "iu" în română. Buzele rotunjite.',en:'Like "you".',ex:[{w:'Umbrella',t:'Umbrelă',e:'☂️',p:'AM-BRELA'},{w:'Under',t:'Sub',e:'⬇️',p:'ANDER'}]},
  {l:'V',ph:'VI',ro:'Ca "v" în română, identic. Dinții sus pe buza jos, vibrezi.',en:'Same as Romanian "v".',ex:[{w:'Voice',t:'Voce',e:'🎤',p:'VOIS'},{w:'Violin',t:'Vioară',e:'🎻',p:'VAI-O-LIN'}]},
  {l:'W',ph:'DABLIU',ro:'Buzele rotunde ca la "u", apoi deschide spre vocală. Nu există în română!',en:'Round lips like "oo" then open into the vowel.',ex:[{w:'Water',t:'Apă',e:'💧',p:'UOTER'},{w:'World',t:'Lume',e:'🌍',p:'UORLD'}]},
  {l:'X',ph:'ECS',ro:'Sună ca "cs" sau "gz" în cuvinte.',en:'Sounds like "ks" or "gz" in words.',ex:[{w:'Box',t:'Cutie',e:'📦',p:'BOCS'},{w:'Exam',t:'Examen',e:'📝',p:'EGZAM'}]},
  {l:'Y',ph:'UUAI',ro:'La început de cuvânt sună ca "i" moale.',en:'Like "y" in "yes" or "you".',ex:[{w:'Yellow',t:'Galben',e:'🟡',p:'IELOU'},{w:'Year',t:'An',e:'📅',p:'IIR'}]},
  {l:'Z',ph:'ZI',ro:'Ca "z" în română. Americanii zic "zi", britanicii "zed".',en:'Americans say "zee", British say "zed".',ex:[{w:'Zero',t:'Zero',e:'0️⃣',p:'ZIROU'},{w:'Zoo',t:'Grădina zoologică',e:'🦁',p:'ZU'}]}
];
let cur=0,lang=localStorage.getItem('EZH_LANG')||'ro';
const done=new Set(JSON.parse(localStorage.getItem('EZH_ALPHA_DONE')||'[]'));
const TL={ro:{hdr:'Alfabetul Englez',ph:'Pronunță în română',ex:'Exemple',prev:'Anterior',next:'Următor',letter:'Litera'},en:{hdr:'The English Alphabet',ph:'Romanian pronunciation',ex:'Examples',prev:'Previous',next:'Next',letter:'Letter'}};
function render(){
  const d=A[cur],L=TL[lang];
  const card=document.getElementById('card');
  card.style.animation='none';requestAnimationFrame(()=>{card.style.animation='cin .4s cubic-bezier(.34,1.56,.64,1) both';});
  document.getElementById('lbig').textContent=d.l;
  document.getElementById('lname').textContent=L.letter+' '+d.l;
  document.getElementById('phtext').textContent=d.ph;
  document.getElementById('phtip').textContent=lang==='ro'?d.ro:d.en;
  document.getElementById('phlbl').textContent=L.ph;
  document.getElementById('exlbl').textContent=L.ex;
  document.getElementById('hdr-t').textContent=L.hdr;
  document.getElementById('tprev').textContent=L.prev;
  document.getElementById('tnext').textContent=cur===A.length-1?'🎉 Final!':L.next;
  const exs=document.getElementById('exs');exs.innerHTML='';
  d.ex.forEach(x=>{const div=document.createElement('div');div.className='exc';div.onclick=()=>sw(x.w);div.innerHTML=`<div class="exem">${x.e}</div><div class="exw">${x.w}</div><div class="exph">${x.p}</div><div class="exro">${x.t}</div>`;exs.appendChild(div);});
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('pfill').style.width=((cur+1)/A.length*100)+'%';
  renderGrid();
}
function renderGrid(){
  const g=document.getElementById('lgrid');g.innerHTML='';
  A.forEach((d,i)=>{const el=document.createElement('div');el.className='gl'+(done.has(i)?' done':'')+(i===cur?' active':'');el.textContent=d.l;el.onclick=()=>{cur=i;render();};g.appendChild(el);});
}
function go(dir){if(dir===1){done.add(cur);localStorage.setItem('EZH_ALPHA_DONE',JSON.stringify([...done]));}cur=Math.max(0,Math.min(A.length-1,cur+dir));render();}
let _v=null;
function _gv(){
  if(_v)return _v;
  const vv=speechSynthesis.getVoices();
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Guy Online (Natural) - English (United States)','Microsoft Zira - English (United States)','Microsoft David - English (United States)','Samantha','Karen','Daniel'];
  for(const n of pref){const v=vv.find(x=>x.name===n);if(v){_v=v;return v;}}
  _v=vv.find(x=>x.lang==='en-US')||vv.find(x=>x.lang.startsWith('en'))||null;
  return _v;
}
speechSynthesis.onvoiceschanged=()=>{_v=null;};
const LN={A:'ay',B:'bee',C:'see',D:'dee',E:'ee',F:'ef',G:'jee',H:'aych',I:'eye',J:'jay',K:'kay',L:'el',M:'em',N:'en',O:'oh',P:'pee',Q:'cue',R:'ar',S:'es',T:'tee',U:'you',V:'vee',W:'double you',X:'ex',Y:'why',Z:'zee'};
function speak(){const d=A[cur];const btn=document.getElementById('abtn');const u=new SpeechSynthesisUtterance(LN[d.l]||d.l);u.lang='en-US';u.rate=.72;u.pitch=1;const v=_gv();if(v)u.voice=v;btn.classList.add('playing');u.onend=()=>btn.classList.remove('playing');speechSynthesis.cancel();speechSynthesis.speak(u);}
window.speak=speak;
function sw(w){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.72;u.pitch=1;const v=_gv();if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);}
function setLang(l){lang=l;localStorage.setItem('EZH_LANG',l);document.getElementById('btn-ro').className='lb'+(l==='ro'?' on':'');document.getElementById('btn-en').className='lb'+(l==='en'?' on':'');render();}
window.setLang=setLang;
render();
</script>
</body>
</html>
