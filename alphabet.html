<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Alfabetul Englez · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("EZH_THEME")||"dark")</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050818;--blue:#00b4ff;--purple:#8b5cf6;--teal:#00e5cc;--frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09);}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 20% 10%,rgba(0,180,255,.15),transparent 65%),radial-gradient(ellipse 55% 45% at 80% 80%,rgba(139,92,246,.15),transparent 60%),#050818}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:13px 20px;display:flex;align-items:center;gap:12px;background:rgba(5,8,24,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);transition:all .2s;flex-shrink:0}
.back:hover{border-color:rgba(0,180,255,.4);background:rgba(0,180,255,.1)}
.hdr-t{font-size:14px;font-weight:700;flex:1}
.pbar{height:3px;background:rgba(255,255,255,.07);position:fixed;top:62px;left:0;right:0;z-index:99}
.pfill{height:100%;background:linear-gradient(90deg,var(--purple),var(--blue),var(--teal));transition:width .4s ease}
.main{padding:82px 20px 100px;min-height:100dvh;display:flex;flex-direction:column;align-items:center;position:relative;z-index:10;gap:16px}

/* Letter card */
.lcard{width:100%;max-width:420px;background:var(--glass);border:1px solid var(--border);border-radius:32px;padding:36px 28px;backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;animation:cin .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cin{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.lcard::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 50%);pointer-events:none}
.lcard.scard{border-color:rgba(139,92,246,.25)}

.lbig{font-size:clamp(96px,22vw,144px);font-weight:900;line-height:1;letter-spacing:-.03em;background:linear-gradient(130deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,180,255,.45));margin-bottom:4px;user-select:none;cursor:pointer;transition:filter .2s}
.lbig:active{filter:drop-shadow(0 0 70px rgba(0,180,255,.95))}
.lbig.playing{animation:lbp 1s ease-in-out infinite}
@keyframes lbp{0%,100%{filter:drop-shadow(0 0 40px rgba(0,180,255,.45))}50%{filter:drop-shadow(0 0 80px rgba(0,180,255,.95)) drop-shadow(0 0 40px rgba(0,229,204,.6))}}
.lbig.sound{font-size:clamp(52px,14vw,88px);background:linear-gradient(130deg,var(--purple),#ff6ad5);filter:drop-shadow(0 0 30px rgba(139,92,246,.55));cursor:default}

.lname{font-size:12px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--frost3);margin-bottom:22px}

/* Letter phonetics box */
.phbox{width:100%;background:rgba(0,180,255,.07);border:1px solid rgba(0,180,255,.18);border-radius:18px;padding:16px 20px;margin-bottom:22px}
.phbox.sbox{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.22)}
.phlbl{font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);opacity:.8;margin-bottom:8px}
.sbox .phlbl{color:var(--purple)}
.phtext{font-size:clamp(52px,14vw,80px);font-weight:900;letter-spacing:.06em;color:var(--blue);text-shadow:0 0 30px rgba(0,180,255,.5);line-height:1.1}
.phtext.tip{font-size:clamp(13px,3.5vw,16px);font-weight:600;letter-spacing:normal;line-height:1.6;color:var(--frost);text-shadow:none;text-transform:uppercase}
.phtip{font-size:18px;color:var(--frost2);margin-top:10px;line-height:1.6}
.phtip.mouth{font-size:13px;font-style:italic;text-transform:uppercase}

.exlbl{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--frost3);margin-bottom:12px;align-self:flex-start}
.exs{display:flex;gap:10px;width:100%}
.exc{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .25s;text-align:center}
.exc:hover{border-color:rgba(0,180,255,.28);background:rgba(0,180,255,.08);transform:translateY(-2px)}
.exc.sexc:hover{border-color:rgba(139,92,246,.28);background:rgba(139,92,246,.08)}
.exem{font-size:28px;margin-bottom:6px}
.exw{font-size:14px;font-weight:700;margin-bottom:2px}
.exph{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.05em;margin-bottom:3px}
.sexc .exph{color:var(--purple)}
.exro{font-size:11px;color:var(--frost2);text-transform:uppercase}

/* Warning box (sounds only) */
.warn-box{background:rgba(255,160,0,.07);border:1px solid rgba(255,160,0,.22);border-radius:14px;padding:12px 14px;margin-top:14px;font-size:12px;color:rgba(255,200,100,.85);line-height:1.55;text-transform:uppercase;width:100%;display:none}
.warn-box.show{display:block}

/* Nav */
.navrow{width:100%;max-width:420px;display:flex;gap:10px}
.nbtn{flex:1;padding:15px;border-radius:16px;border:1px solid var(--border);background:var(--glass);color:var(--frost);font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:6px}
.nbtn:hover{border-color:rgba(0,180,255,.35);background:rgba(0,180,255,.08)}
.nbtn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.nbtn.primary{background:linear-gradient(135deg,var(--blue),var(--teal));border:none;box-shadow:0 0 20px rgba(0,180,255,.3)}
.nbtn.primary:hover{box-shadow:0 0 40px rgba(0,180,255,.55)}

/* Grid */
.grid-wrap{width:100%;max-width:420px}
.grid-lbl{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--frost3);margin-bottom:6px}
.lgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;padding:4px 0}
.gl{aspect-ratio:1;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--frost2)}
.gl:hover{border-color:rgba(0,180,255,.35);color:var(--blue)}
.gl.done{background:rgba(0,229,204,.10);border-color:rgba(0,229,204,.28);color:var(--teal)}
.gl.active{background:rgba(0,180,255,.16);border-color:rgba(0,180,255,.5);color:var(--frost);box-shadow:0 0 14px rgba(0,180,255,.28)}
.gl.snd{font-size:9px}
.gl.snd:hover{border-color:rgba(139,92,246,.35);color:var(--purple)}
.gl.snd.done{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.32);color:var(--purple)}
.gl.snd.active{background:rgba(139,92,246,.18);border-color:rgba(139,92,246,.55);color:var(--frost);box-shadow:0 0 14px rgba(139,92,246,.3)}
.grid-sep{grid-column:1/-1;height:1px;background:var(--border);margin:2px 0}
/* light mode */
[data-theme=light]{--bg:#f0f5ff;--frost:rgba(8,12,42,.88);--frost2:rgba(8,12,42,.52);--frost3:rgba(8,12,42,.22);--glass:rgba(255,255,255,.78);--border:rgba(8,12,42,.10)}
[data-theme=light] body{background:var(--bg)}
[data-theme=light] .bg{background:radial-gradient(ellipse 70% 55% at 15% 8%,rgba(139,92,246,.13),transparent 65%),radial-gradient(ellipse 55% 45% at 85% 85%,rgba(0,180,255,.11),transparent 60%),radial-gradient(ellipse 45% 35% at 65% 25%,rgba(0,229,204,.09),transparent 55%),var(--bg)}
[data-theme=light] .hdr{background:rgba(240,245,255,.95);border-color:rgba(8,12,42,.08)}
.theme-btn{width:34px;height:34px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0;line-height:1}
.theme-btn:hover{border-color:rgba(255,196,0,.45);background:rgba(255,196,0,.1)}
</style>
</head>
<body>
<div class="bg"></div>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t" id="hdr-t">Alfabetul Englez</div>
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
</header>
<div class="pbar"><div class="pfill" id="pfill" style="width:3.1%"></div></div>
<main class="main">
  <div class="lcard" id="card">
    <div class="lbig" id="lbig" onclick="speak()">A</div>
    <div class="lname" id="lname">Litera A</div>
    <div class="phbox" id="phbox">
      <div class="phlbl" id="phlbl">Pronunță în română</div>
      <div class="phtext" id="phtext"></div>
      <div class="phtip" id="phtip"></div>
    </div>
    <div class="exlbl" id="exlbl">Exemple</div>
    <div class="exs" id="exs"></div>
    <div class="warn-box" id="warnbox"></div>
  </div>
  <div class="navrow">
    <button class="nbtn" id="bprev" onclick="go(-1)">← <span id="tprev">Anterior</span></button>
    <button class="nbtn primary" id="bnext" onclick="go(1)"><span id="tnext">Următor</span> →</button>
  </div>
  <div class="grid-wrap">
    <div class="lgrid" id="lgrid"></div>
  </div>
</main>
<script>
const A=[
  {l:'A',ph:'EI',ro:'Ca în "hey" fără "h". Deschide gura pe larg.',ex:[{w:'Apple',t:'Măr',e:'🍎',p:'A-PL'},{w:'Airplane',t:'Avion',e:'✈️',p:'EIR-PLEIN'}]},
  {l:'B',ph:'BI',ro:'Ca "b" în română, identic.',ex:[{w:'Ball',t:'Minge',e:'⚽',p:'BOL'},{w:'Book',t:'Carte',e:'📚',p:'BUK'}]},
  {l:'C',ph:'SI',ro:'Numele literei sună "si". În cuvinte poate fi "k" (cat) sau "s" (city).',ex:[{w:'Cat',t:'Pisică',e:'🐱',p:'KAT'},{w:'City',t:'Oraș',e:'🏙️',p:'SI-TI'}]},
  {l:'D',ph:'DI',ro:'Ca "d" în română, identic.',ex:[{w:'Dog',t:'Câine',e:'🐶',p:'DOG'},{w:'Door',t:'Ușă',e:'🚪',p:'DOR'}]},
  {l:'E',ph:'I',ro:'Ca "i" lung în română. Scurt și clar.',ex:[{w:'Egg',t:'Ou',e:'🥚',p:'EG'},{w:'Elephant',t:'Elefant',e:'🐘',p:'ELE-FANT'}]},
  {l:'F',ph:'EF',ro:'Dinții de sus pe buza de jos, sufli aer. Ca "f" românesc.',ex:[{w:'Fish',t:'Pește',e:'🐟',p:'FIȘ'},{w:'Flower',t:'Floare',e:'🌸',p:'FLAUR'}]},
  {l:'G',ph:'GI',ro:'Ca "g" în "get", mereu dur. Nu "j"!',ex:[{w:'Green',t:'Verde',e:'🟢',p:'GRIN'},{w:'Girl',t:'Fată',e:'👧',p:'GÂRL'}]},
  {l:'H',ph:'EICH',ro:'O aspirație ușoară, ca la "h" românesc.',ex:[{w:'House',t:'Casă',e:'🏠',p:'HAUS'},{w:'Hello',t:'Bună',e:'👋',p:'HELOU'}]},
  {l:'I',ph:'AI',ro:'Ca "ai" în română, ca un "oftat".',ex:[{w:'Ice',t:'Gheață',e:'🧊',p:'AIS'},{w:'Island',t:'Insulă',e:'🏝️',p:'AI-LAND'}]},
  {l:'J',ph:'DJEI',ro:'Ca "dj". Nu există "j" românesc în engleză!',ex:[{w:'Juice',t:'Suc',e:'🧃',p:'DJUS'},{w:'Jump',t:'Salt',e:'🦘',p:'DJAMP'}]},
  {l:'K',ph:'KEI',ro:'Ca "k" sau "c" dur în română.',ex:[{w:'King',t:'Rege',e:'👑',p:'KING'},{w:'Key',t:'Cheie',e:'🔑',p:'KI'}]},
  {l:'L',ph:'EL',ro:'Ca "l" în română, identic.',ex:[{w:'Lion',t:'Leu',e:'🦁',p:'LAION'},{w:'Love',t:'Dragoste',e:'❤️',p:'LAV'}]},
  {l:'M',ph:'EM',ro:'Ca "m" în română, identic.',ex:[{w:'Moon',t:'Lună',e:'🌙',p:'MUN'},{w:'Mother',t:'Mamă',e:'👩',p:'MADER'}]},
  {l:'N',ph:'EN',ro:'Ca "n" în română, identic.',ex:[{w:'Night',t:'Noapte',e:'🌃',p:'NAIT'},{w:'Name',t:'Nume',e:'📛',p:'NEIM'}]},
  {l:'O',ph:'OU',ro:'Ca "ou" în română, buzele rotunjite.',ex:[{w:'Orange',t:'Portocală',e:'🍊',p:'ORINJ'},{w:'Open',t:'Deschis',e:'🔓',p:'OUPEN'}]},
  {l:'P',ph:'PI',ro:'Ca "p" în română, cu o mică aspirație.',ex:[{w:'Pizza',t:'Pizza',e:'🍕',p:'PITSA'},{w:'Phone',t:'Telefon',e:'📱',p:'FOUN'}]},
  {l:'Q',ph:'CHIUU',ro:'Mereu urmat de "u". Sună ca "kw".',ex:[{w:'Queen',t:'Regină',e:'👸',p:'KUIN'},{w:'Question',t:'Întrebare',e:'❓',p:'KUESCION'}]},
  {l:'R',ph:'AR',ro:'NU rula R-ul! Ridică ușor vârful limbii spre cer, fără să atingi palatul.',ex:[{w:'Rain',t:'Ploaie',e:'🌧️',p:'REIN'},{w:'Red',t:'Roșu',e:'🔴',p:'RED'}]},
  {l:'S',ph:'ES',ro:'Ca "s" în română, identic.',ex:[{w:'Sun',t:'Soare',e:'☀️',p:'SAN'},{w:'Star',t:'Stea',e:'⭐',p:'STAR'}]},
  {l:'T',ph:'TI',ro:'Ca "t" în română, cu o mică aspirație.',ex:[{w:'Tree',t:'Copac',e:'🌳',p:'TRI'},{w:'Time',t:'Timp',e:'⏰',p:'TAIM'}]},
  {l:'U',ph:'IU',ro:'Ca "iu" în română. Buzele rotunjite.',ex:[{w:'Umbrella',t:'Umbrelă',e:'☂️',p:'AM-BRELA'},{w:'Under',t:'Sub',e:'⬇️',p:'ANDER'}]},
  {l:'V',ph:'VI',ro:'Ca "v" în română, identic. Dinții sus pe buza jos, vibrezi.',ex:[{w:'Voice',t:'Voce',e:'🎤',p:'VOIS'},{w:'Violin',t:'Vioară',e:'🎻',p:'VAI-O-LIN'}]},
  {l:'W',ph:'DABLIU',ro:'Buzele rotunde ca la "u", apoi deschide spre vocală. Nu există în română!',ex:[{w:'Water',t:'Apă',e:'💧',p:'UOTER'},{w:'World',t:'Lume',e:'🌍',p:'UORLD'}]},
  {l:'X',ph:'ECS',ro:'Sună ca "cs" sau "gz" în cuvinte.',ex:[{w:'Box',t:'Cutie',e:'📦',p:'BOCS'},{w:'Exam',t:'Examen',e:'📝',p:'EGZAM'}]},
  {l:'Y',ph:'UUAI',ro:'La început de cuvânt sună ca "i" moale.',ex:[{w:'Yellow',t:'Galben',e:'🟡',p:'IELOU'},{w:'Year',t:'An',e:'📅',p:'IIR'}]},
  {l:'Z',ph:'ZI',ro:'Ca "z" în română. Americanii zic "zi", britanicii "zed".',ex:[{w:'Zero',t:'Zero',e:'0️⃣',p:'ZIROU'},{w:'Zoo',t:'Grădina zoologică',e:'🦁',p:'ZU'}]},
  /* ── Sunete Dificile ── */
  {type:'sound',badge:'TH',l:'TH',title:'TH SONOR',
   ro:'Pune vârful limbii ÎNTRE dinți și vibra-ți corzile vocale. Ca "z" dar cu limba ieșită între dinți.',
   mouth:'Limbă între dinți, vibrând ușor. Simți vibrația la gât.',
   warn:'⚠️ Nu spune "de" sau "ze"! Limba TREBUIE să iasă între dinți.',
   ex:[{w:'The',t:'Articolul',e:'📖',p:'ĐĂ'},{w:'Mother',t:'Mamă',e:'👩',p:'MAĐER'}]},
  {type:'sound',badge:'TH',l:'TH',title:'TH SURD',
   ro:'La fel ca TH sonor, dar fără vibrație vocală. Sufli aer rece printre dinți și limbă.',
   mouth:'Limbă între dinți, sufli aer rece. Nu simți vibrație la gât.',
   warn:'⚠️ Nu spune "t", "s" sau "f"! Limba între dinți!',
   ex:[{w:'Think',t:'A gândi',e:'🤔',p:'ΘINK'},{w:'Three',t:'Trei',e:'3️⃣',p:'ΘRII'}]},
  {type:'sound',badge:'SH',l:'SH',title:'SH',
   ro:'Ca "ș" din română! Este același sunet. Buzele ușor înainte și rotunjite.',
   mouth:'Buzele se rotunjesc ușor și se apropie. Limba în spate.',
   warn:'✅ Ești norocos! "SH" în engleză = "Ș" în română.',
   ex:[{w:'She',t:'Ea',e:'👧',p:'ȘI'},{w:'Fish',t:'Pește',e:'🐟',p:'FIȘ'}]},
  {type:'sound',badge:'CH',l:'CH',title:'CH',
   ro:'Ca "ci" sau "ce" din română — același sunet! "Chair" = "CEIR", "beach" = "BIICI".',
   mouth:'Limba sus și în față, aerul iese brusc.',
   warn:'✅ Norocos din nou! "CH" englez = "C" înaintea lui "i/e" în română.',
   ex:[{w:'Chair',t:'Scaun',e:'🪑',p:'CEIR'},{w:'Beach',t:'Plajă',e:'🏖️',p:'BIICI'}]},
  {type:'sound',badge:'R',l:'R',title:'R ENGLEZESC',
   ro:'NICIODATĂ nu rula R-ul ca în română! Ridică ușor vârful limbii spre cer, fără să atingi nimic.',
   mouth:'Vârful limbii sus, fără contact cu palatul. Buzele se rotunjesc puțin.',
   warn:'⚠️ R-ul rulat românesc sună foarte ciudat în engleză. Necesită practică!',
   ex:[{w:'Rain',t:'Ploaie',e:'🌧️',p:'REIN'},{w:'Red',t:'Roșu',e:'🔴',p:'RED'}]},
  {type:'sound',badge:'W',l:'W',title:'W',
   ro:'Buzele rotunde și proiectate în față ca la "u", apoi deschizi rapid spre vocala următoare. Nu este "v"!',
   mouth:'Buzele ca pentru "u", apoi deschis rapid. Ca un sărut în aer.',
   warn:'⚠️ "W" ≠ "V"! "Wine" (vin de struguri) ≠ "vine" (el vine). Sunt sunete diferite!',
   ex:[{w:'Water',t:'Apă',e:'💧',p:'UOTER'},{w:'World',t:'Lume',e:'🌍',p:'UORLD'}]},
];

let cur=0;
const done=new Set(JSON.parse(localStorage.getItem('EZH_ALPHA_DONE')||'[]'));

function render(){
  const d=A[cur];
  const isSound=d.type==='sound';
  const card=document.getElementById('card');
  card.style.animation='none';
  requestAnimationFrame(()=>{card.style.animation='cin .4s cubic-bezier(.34,1.56,.64,1) both';});
  card.className=isSound?'lcard scard':'lcard';

  const lbig=document.getElementById('lbig');
  lbig.textContent=isSound?d.badge:d.l;
  lbig.className=isSound?'lbig sound':'lbig';
  lbig.onclick=isSound?()=>sw(d.ex[0].w):speak;

  document.getElementById('lname').textContent=isSound?d.title:'Litera '+d.l;
  document.getElementById('hdr-t').textContent=isSound?'Sunete Dificile':'Alfabetul Englez';

  const phbox=document.getElementById('phbox');
  phbox.className=isSound?'phbox sbox':'phbox';
  document.getElementById('phlbl').textContent=isSound?'Cum pronunți':'Pronunță în română';

  const phtext=document.getElementById('phtext');
  if(isSound){phtext.textContent=d.ro;phtext.className='phtext tip';}
  else{phtext.textContent=d.ph;phtext.className='phtext';}

  const phtip=document.getElementById('phtip');
  phtip.textContent=isSound?d.mouth:d.ro;
  phtip.className=isSound?'phtip mouth':'phtip';

  const wb=document.getElementById('warnbox');
  if(isSound){wb.textContent=d.warn;wb.className='warn-box show';}
  else{wb.className='warn-box';}

  document.getElementById('exlbl').textContent='Exemple';
  const exs=document.getElementById('exs');exs.innerHTML='';
  d.ex.forEach(x=>{
    const div=document.createElement('div');
    div.className=isSound?'exc sexc':'exc';
    div.onclick=()=>sw(x.w);
    div.innerHTML=`<div class="exem">${x.e}</div><div class="exw">${x.w}</div><div class="exph">${x.p}</div><div class="exro">${x.t}</div>`;
    exs.appendChild(div);
  });

  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('tnext').textContent=cur===A.length-1?'🎉 Gata!':'Următor';
  document.getElementById('pfill').style.width=((cur+1)/A.length*100)+'%';
  renderGrid();
}

function renderGrid(){
  const g=document.getElementById('lgrid');g.innerHTML='';
  const sep=document.createElement('div');sep.className='grid-sep';
  A.forEach((d,i)=>{
    if(i===26){g.appendChild(sep);}
    const el=document.createElement('div');
    const isS=d.type==='sound';
    el.className='gl'+(isS?' snd':'')+(done.has(i)?' done':'')+(i===cur?' active':'');
    el.textContent=isS?d.badge:d.l;
    el.onclick=()=>{cur=i;render();};
    g.appendChild(el);
  });
}

function go(dir){
  if(dir===1){done.add(cur);localStorage.setItem('EZH_ALPHA_DONE',JSON.stringify([...done]));}
  cur=Math.max(0,Math.min(A.length-1,cur+dir));
  render();
}

let _v=null;
function _gv(){
  if(_v)return _v;
  const vv=speechSynthesis.getVoices();
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Guy Online (Natural) - English (United States)','Microsoft Zira - English (United States)','Microsoft David - English (United States)','Samantha','Karen','Daniel'];
  for(const n of pref){const v=vv.find(x=>x.name===n);if(v){_v=v;return v;}}
  _v=vv.find(x=>x.lang==='en-US')||vv.find(x=>x.lang.startsWith('en'))||null;
  return _v;
}
speechSynthesis.onvoiceschanged=()=>{_v=null;};
const LN={A:'ay',B:'bee',C:'see',D:'dee',E:'ee',F:'ef',G:'jee',H:'aych',I:'eye',J:'jay',K:'kay',L:'el',M:'em',N:'en',O:'oh',P:'pee',Q:'cue',R:'ar',S:'es',T:'tee',U:'you',V:'vee',W:'double you',X:'ex',Y:'why',Z:'zee'};
function speak(){
  const d=A[cur];
  const lbig=document.getElementById('lbig');
  const u=new SpeechSynthesisUtterance(LN[d.l]||d.l);
  u.lang='en-US';u.rate=.72;u.pitch=1;
  const v=_gv();if(v)u.voice=v;
  lbig.classList.add('playing');u.onend=()=>lbig.classList.remove('playing');
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
window.speak=speak;
function sw(w){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.72;u.pitch=1;const v=_gv();if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);}
render();
</script>
<script src="theme.js"></script>
