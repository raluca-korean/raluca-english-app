<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vocabular · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050818;--blue:#00b4ff;--purple:#8b5cf6;--teal:#00e5cc;--gold:#ffc400;--frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09);}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 65% 50% at 80% 10%,rgba(0,229,204,.16),transparent 65%),radial-gradient(ellipse 55% 45% at 15% 80%,rgba(0,180,255,.14),transparent 60%),#050818}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:13px 20px;display:flex;align-items:center;gap:12px;background:rgba(5,8,24,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);transition:all .2s;flex-shrink:0}
.back:hover{border-color:rgba(0,229,204,.4);background:rgba(0,229,204,.1)}
.hdr-t{font-size:14px;font-weight:700;flex:1}
.main{padding:78px 20px 48px;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px}

/* Category view */
.view{width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.page-title{text-align:center;padding:20px 0 8px}
.page-title h1{font-size:clamp(22px,6vw,32px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(130deg,var(--teal),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.page-title p{font-size:13px;color:var(--frost2);line-height:1.55}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ccat{background:var(--glass);border:1px solid var(--border);border-radius:20px;padding:20px 16px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(16px)}
.ccat:hover{transform:translateY(-3px) scale(1.02);border-color:rgba(0,229,204,.30);box-shadow:0 12px 36px rgba(0,229,204,.18)}
.cat-emo{font-size:36px;margin-bottom:8px}
.cat-name{font-size:14px;font-weight:700;margin-bottom:3px}
.cat-count{font-size:11px;color:var(--frost2)}
.cat-prog{height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:10px;overflow:hidden}
.cat-pf{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:2px}

/* Word view */
.word-view{display:none;width:100%;max-width:480px}
.wv-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-top:16px}
.wv-back{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:600;color:var(--frost2);transition:all .2s}
.wv-back:hover{border-color:rgba(0,229,204,.3);color:var(--teal)}
.wv-title{font-size:16px;font-weight:800;flex:1}
.wv-count{font-size:12px;color:var(--frost2)}
.word-list{display:flex;flex-direction:column;gap:10px}
.wcard{background:var(--glass);border:1px solid var(--border);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .25s;backdrop-filter:blur(16px)}
.wcard:hover{border-color:rgba(0,229,204,.28);background:rgba(0,229,204,.06);transform:translateX(3px)}
.wcard.done{background:rgba(0,229,204,.07);border-color:rgba(0,229,204,.22)}
.wemo{font-size:28px;flex-shrink:0}
.winfo{flex:1}
.wen{font-size:17px;font-weight:700;margin-bottom:2px}
.wph{font-size:11.5px;font-weight:700;color:var(--teal);letter-spacing:.04em;margin-bottom:2px}
.wro{font-size:12px;color:var(--frost2)}
.wspeakico{font-size:20px;opacity:.5;flex-shrink:0;transition:opacity .2s}
.wcard:hover .wspeakico{opacity:1}
.wdone{font-size:14px;opacity:.5}
</style>
</head>
<body>
<div class="bg"></div>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t" id="hdr-t">Primele 100 Cuvinte</div>
</header>
<main class="main">
  <div class="view" id="cat-view">
    <div class="page-title">
      <h1 id="pg-h1">Primele 100 Cuvinte</h1>
      <p id="pg-sub">Alege o categorie și începe să înveți. Apasă pe un cuvânt pentru a auzi pronunția.</p>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>
  <div class="word-view" id="word-view">
    <div class="wv-hdr">
      <button class="wv-back" onclick="showCats()">← <span id="t-back">Categorii</span></button>
      <div class="wv-title" id="wv-title">—</div>
      <div class="wv-count" id="wv-count"></div>
    </div>
    <div class="word-list" id="word-list"></div>
  </div>
</main>
<script>
const CATS=[
  {id:'home',emo:'🏠',ro:'Casă',en:'Home',words:[
    {w:'House',ro:'Casă',ph:'HAUS',e:'🏠'},{w:'Room',ro:'Cameră',ph:'RUUM',e:'🛋️'},{w:'Door',ro:'Ușă',ph:'DOR',e:'🚪'},{w:'Window',ro:'Fereastră',ph:'UINDOU',e:'🪟'},{w:'Kitchen',ro:'Bucătărie',ph:'KICEN',e:'🍳'},{w:'Bathroom',ro:'Baie',ph:'BAΘRUUM',e:'🛁'},{w:'Bedroom',ro:'Dormitor',ph:'BEDRUUM',e:'🛏️'},{w:'Table',ro:'Masă',ph:'TEIBL',e:'🪑'},{w:'Chair',ro:'Scaun',ph:'CEIR',e:'🪑'},{w:'Bed',ro:'Pat',ph:'BED',e:'🛏️'},{w:'Sofa',ro:'Canapea',ph:'SOUFA',e:'🛋️'},{w:'Lamp',ro:'Lampă',ph:'LAMP',e:'💡'},{w:'TV',ro:'Televizor',ph:'TI-VII',e:'📺'},{w:'Phone',ro:'Telefon',ph:'FOUN',e:'📱'},{w:'Key',ro:'Cheie',ph:'KI',e:'🔑'},{w:'Garden',ro:'Grădină',ph:'GARDN',e:'🌿'},{w:'Stairs',ro:'Scări',ph:'STERZ',e:'🪜'}
  ]},
  {id:'family',emo:'👨‍👩‍👧',ro:'Familie',en:'Family',words:[
    {w:'Mother',ro:'Mamă',ph:'MAĐER',e:'👩'},{w:'Father',ro:'Tată',ph:'FAĐER',e:'👨'},{w:'Sister',ro:'Soră',ph:'SISTER',e:'👧'},{w:'Brother',ro:'Frate',ph:'BRAĐER',e:'👦'},{w:'Baby',ro:'Bebeluș',ph:'BEIBI',e:'👶'},{w:'Grandmother',ro:'Bunică',ph:'GRANMAĐER',e:'👵'},{w:'Grandfather',ro:'Bunic',ph:'GRANFAĐER',e:'👴'},{w:'Son',ro:'Fiu',ph:'SAN',e:'👦'},{w:'Daughter',ro:'Fiică',ph:'DOTER',e:'👧'},{w:'Husband',ro:'Soț',ph:'HAZBAND',e:'👨'},{w:'Wife',ro:'Soție',ph:'UAIF',e:'👩'},{w:'Friend',ro:'Prieten',ph:'FREND',e:'🤝'},{w:'Aunt',ro:'Mătușă',ph:'ANT',e:'👩'},{w:'Uncle',ro:'Unchi',ph:'ANKL',e:'👨'},{w:'Cousin',ro:'Văr/Vară',ph:'KAZN',e:'🧑'},{w:'Child',ro:'Copil',ph:'CEAILD',e:'🧒'},{w:'Family',ro:'Familie',ph:'FAMILI',e:'👨‍👩‍👧'}
  ]},
  {id:'food',emo:'🍎',ro:'Mâncare',en:'Food',words:[
    {w:'Apple',ro:'Măr',ph:'APL',e:'🍎'},{w:'Bread',ro:'Pâine',ph:'BRED',e:'🍞'},{w:'Water',ro:'Apă',ph:'UOTER',e:'💧'},{w:'Milk',ro:'Lapte',ph:'MILK',e:'🥛'},{w:'Egg',ro:'Ou',ph:'EG',e:'🥚'},{w:'Cheese',ro:'Brânză',ph:'CIIZ',e:'🧀'},{w:'Chicken',ro:'Pui',ph:'CIKEN',e:'🍗'},{w:'Rice',ro:'Orez',ph:'RAIS',e:'🍚'},{w:'Soup',ro:'Supă',ph:'SUUP',e:'🍲'},{w:'Pizza',ro:'Pizza',ph:'PITSA',e:'🍕'},{w:'Coffee',ro:'Cafea',ph:'COFI',e:'☕'},{w:'Tea',ro:'Ceai',ph:'TII',e:'🍵'},{w:'Juice',ro:'Suc',ph:'DJUS',e:'🧃'},{w:'Sugar',ro:'Zahăr',ph:'ȘUGAR',e:'🍬'},{w:'Salt',ro:'Sare',ph:'SOLT',e:'🧂'},{w:'Fish',ro:'Pește',ph:'FIȘ',e:'🐟'},{w:'Fruit',ro:'Fruct',ph:'FRUUT',e:'🍓'}
  ]},
  {id:'transport',emo:'🚗',ro:'Transport',en:'Transport',words:[
    {w:'Car',ro:'Mașină',ph:'KAR',e:'🚗'},{w:'Bus',ro:'Autobuz',ph:'BAS',e:'🚌'},{w:'Train',ro:'Tren',ph:'TREIN',e:'🚂'},{w:'Airplane',ro:'Avion',ph:'AIRPLEIN',e:'✈️'},{w:'Taxi',ro:'Taxi',ph:'TAKSI',e:'🚕'},{w:'Bicycle',ro:'Bicicletă',ph:'BAISIKL',e:'🚲'},{w:'Street',ro:'Stradă',ph:'STRIIT',e:'🛣️'},{w:'Road',ro:'Drum',ph:'ROUD',e:'🛤️'},{w:'Station',ro:'Stație',ph:'STEIȘEN',e:'🏢'},{w:'Airport',ro:'Aeroport',ph:'AIRPORT',e:'🛫'},{w:'Ticket',ro:'Bilet',ph:'TIKET',e:'🎫'},{w:'Map',ro:'Hartă',ph:'MAP',e:'🗺️'},{w:'Left',ro:'Stânga',ph:'LEFT',e:'⬅️'},{w:'Right',ro:'Dreapta',ph:'RAIT',e:'➡️'},{w:'Straight',ro:'Înainte',ph:'STREIT',e:'⬆️'},{w:'Stop',ro:'Stop',ph:'STOP',e:'🛑'},{w:'Go',ro:'Mergi',ph:'GOU',e:'🟢'}
  ]},
  {id:'work',emo:'💼',ro:'Muncă',en:'Work',words:[
    {w:'Work',ro:'Muncă',ph:'UORK',e:'💼'},{w:'Office',ro:'Birou',ph:'OFIS',e:'🏢'},{w:'Computer',ro:'Calculator',ph:'KOMPUTER',e:'💻'},{w:'Meeting',ro:'Întâlnire',ph:'MIITING',e:'👥'},{w:'Boss',ro:'Șef',ph:'BOS',e:'👔'},{w:'Money',ro:'Bani',ph:'MANI',e:'💰'},{w:'Job',ro:'Serviciu',ph:'DJOB',e:'🔧'},{w:'Email',ro:'Email',ph:'I-MEIL',e:'📧'},{w:'Phone call',ro:'Apel telefonic',ph:'FOUN COL',e:'📞'},{w:'Document',ro:'Document',ph:'DOCIUMENT',e:'📄'},{w:'Team',ro:'Echipă',ph:'TIIM',e:'👫'},{w:'Project',ro:'Proiect',ph:'PRODJEKT',e:'📊'},{w:'Lunch',ro:'Prânz',ph:'LANC',e:'🍱'},{w:'Morning',ro:'Dimineață',ph:'MORNING',e:'🌅'},{w:'Deadline',ro:'Termen limită',ph:'DEDLAIN',e:'⏰'},{w:'Salary',ro:'Salariu',ph:'SALERI',e:'💵'},{w:'Holiday',ro:'Vacanță',ph:'HOLIDEI',e:'🏖️'}
  ]},
  {id:'travel',emo:'✈️',ro:'Călătorii',en:'Travel',words:[
    {w:'Hotel',ro:'Hotel',ph:'HOUTEL',e:'🏨'},{w:'Room',ro:'Cameră',ph:'RUUM',e:'🛏️'},{w:'Passport',ro:'Pașaport',ph:'PASSPORT',e:'📘'},{w:'Luggage',ro:'Bagaj',ph:'LAGIDJ',e:'🧳'},{w:'Beach',ro:'Plajă',ph:'BIICI',e:'🏖️'},{w:'Mountain',ro:'Munte',ph:'MAUNTIN',e:'⛰️'},{w:'City',ro:'Oraș',ph:'SITI',e:'🏙️'},{w:'Restaurant',ro:'Restaurant',ph:'RESTORANT',e:'🍽️'},{w:'Museum',ro:'Muzeu',ph:'MIUZIIM',e:'🏛️'},{w:'Camera',ro:'Aparat foto',ph:'KAMERA',e:'📷'},{w:'Souvenir',ro:'Suvenir',ph:'SUVENIR',e:'🎁'},{w:'Check in',ro:'Check in',ph:'CEK IN',e:'✅'},{w:'Check out',ro:'Check out',ph:'CEK AUT',e:'🚪'},{w:'Tour',ro:'Tur',ph:'TUR',e:'🗺️'},{w:'Guide',ro:'Ghid',ph:'GAID',e:'🧑‍🏫'},{w:'Visa',ro:'Viză',ph:'VIIZA',e:'🪪'},{w:'Currency',ro:'Monedă',ph:'KARENSI',e:'💱'}
  ]}
];
const wordDone=new Set(JSON.parse(localStorage.getItem('EZH_VOCAB_DONE')||'[]'));
function buildCats(){
  const g=document.getElementById('cat-grid');g.innerHTML='';
  CATS.forEach((c,ci)=>{
    const doneCount=c.words.filter((_,wi)=>wordDone.has(c.id+'_'+wi)).length;
    const pct=Math.round(doneCount/c.words.length*100);
    const div=document.createElement('div');div.className='ccat';
    div.innerHTML=`<div class="cat-emo">${c.emo}</div><div class="cat-name">${c.ro}</div><div class="cat-count">${doneCount}/${c.words.length} cuvinte</div><div class="cat-prog"><div class="cat-pf" style="width:${pct}%"></div></div>`;
    div.onclick=()=>showWords(ci);
    g.appendChild(div);
  });
}
function showCats(){
  document.getElementById('cat-view').style.display='';
  document.getElementById('word-view').style.display='none';
}
function showWords(ci){
  const c=CATS[ci];
  document.getElementById('cat-view').style.display='none';
  const wv=document.getElementById('word-view');wv.style.display='';
  document.getElementById('wv-title').textContent=c.ro+' '+c.emo;
  document.getElementById('wv-count').textContent=c.words.length+' cuvinte';
  const wl=document.getElementById('word-list');wl.innerHTML='';
  c.words.forEach((w,wi)=>{
    const key=c.id+'_'+wi;
    const div=document.createElement('div');
    div.className='wcard'+(wordDone.has(key)?' done':'');
    div.innerHTML=`<div class="wemo">${w.e}</div><div class="winfo"><div class="wen">${w.w}</div><div class="wph">${w.ph}</div><div class="wro">${w.ro}</div></div><div class="wspeakico">🔊</div>`;
    div.onclick=()=>{wordDone.add(key);localStorage.setItem('EZH_VOCAB_DONE',JSON.stringify([...wordDone]));div.classList.add('done');sw(w.w);};
    wl.appendChild(div);
  });
}
function sw(w){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.78;speechSynthesis.cancel();speechSynthesis.speak(u);}
window.showCats=showCats;
buildCats();
</script>
</body>
</html>
