<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dicționar · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<script>document.documentElement.setAttribute("data-theme",localStorage.getItem("EZH_THEME")||"dark")</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050818;
  --blue:#00b4ff;--purple:#8b5cf6;--teal:#00e5cc;--gold:#ffc400;
  --frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);
  --glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09);
}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-top:57px}
.bg{position:fixed;inset:0;background:
  radial-gradient(ellipse 65% 50% at 80% 10%,rgba(0,229,204,.16),transparent 65%),
  radial-gradient(ellipse 55% 45% at 15% 80%,rgba(0,180,255,.14),transparent 60%),
  #050818}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:57px;padding:0 20px;display:flex;align-items:center;gap:12px;background:rgba(5,8,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);transition:all .2s;flex-shrink:0}
.back:hover{border-color:rgba(0,229,204,.4);background:rgba(0,229,204,.1)}
.hdr-t{font-size:15px;font-weight:700;flex:1}
.hdr-cnt{font-size:11.5px;color:var(--teal);font-weight:700;background:rgba(0,229,204,.12);border:1px solid rgba(0,229,204,.25);padding:3px 10px;border-radius:12px;white-space:nowrap}

/* Sticky search + pills */
.sticky-bar{position:sticky;top:57px;z-index:50;background:rgba(5,8,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.05)}
.search-wrap{padding:12px 20px 8px}
.search-rel{position:relative}
.search-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:.5}
.search-input{width:100%;padding:11px 14px 11px 38px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--frost);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s,background .2s;-webkit-appearance:none}
.search-input:focus{border-color:rgba(0,229,204,.38);background:rgba(0,229,204,.04)}
.search-input::placeholder{color:var(--frost3)}

/* Pills */
.pills{display:flex;gap:8px;overflow-x:auto;padding:4px 20px 12px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--glass);color:var(--frost2);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none;-webkit-user-select:none}
.pill.active{background:rgba(0,229,204,.15);border-color:rgba(0,229,204,.38);color:var(--teal)}
.pill:hover:not(.active){border-color:rgba(255,255,255,.18);color:var(--frost)}

/* Main */
.main{padding:14px 20px 56px;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center}

/* Word list */
.word-list{width:100%;max-width:480px;display:flex;flex-direction:column;gap:8px}

/* Word card */
.wcard{background:var(--glass);border:1px solid var(--border);border-radius:18px;padding:13px 15px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .22s,background .22s,transform .22s;backdrop-filter:blur(16px)}
.wcard:hover{border-color:rgba(0,229,204,.28);background:rgba(0,229,204,.05);transform:translateX(3px)}
.wcard.learned{background:rgba(0,229,204,.06);border-color:rgba(0,229,204,.22)}
.wcard.speaking{border-color:rgba(0,180,255,.5);box-shadow:0 0 20px rgba(0,180,255,.18)}

.wico{width:44px;height:44px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.wico.is-color{border-radius:50%;border:none}
.wnum{font-size:18px;font-weight:900;background:linear-gradient(135deg,var(--gold),#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.winfo{flex:1;min-width:0}
.wen{font-size:16px;font-weight:700;margin-bottom:1px}
.wph{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.05em;margin-bottom:2px}
.wro{font-size:12px;color:var(--frost2)}

.wright{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0}
.wsound{font-size:20px;opacity:.4;transition:opacity .2s;line-height:1}
.wcard:hover .wsound{opacity:.85}
.wcard.speaking .wsound{opacity:1;animation:pu .55s infinite alternate}

.wcheck{width:22px;height:22px;border-radius:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;color:transparent}
.wcard.learned .wcheck{background:rgba(0,229,204,.2);border-color:rgba(0,229,204,.6);color:var(--teal)}

/* Empty */
.empty{text-align:center;padding:64px 20px;color:var(--frost2);width:100%;max-width:480px}
.empty-emo{font-size:52px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600;color:var(--frost);margin-bottom:6px}
.empty-s{font-size:13px}

@keyframes pu{from{transform:scale(1)}to{transform:scale(1.18)}}
@media(max-width:360px){.wen{font-size:15px}.hdr-cnt{display:none}}
/* light mode */
[data-theme=light]{--bg:#f0f5ff;--frost:rgba(8,12,42,.88);--frost2:rgba(8,12,42,.52);--frost3:rgba(8,12,42,.22);--glass:rgba(255,255,255,.78);--border:rgba(8,12,42,.10)}
[data-theme=light] body{background:var(--bg)}
[data-theme=light] .bg{background:radial-gradient(ellipse 70% 55% at 15% 8%,rgba(139,92,246,.13),transparent 65%),radial-gradient(ellipse 55% 45% at 85% 85%,rgba(0,180,255,.11),transparent 60%),radial-gradient(ellipse 45% 35% at 65% 25%,rgba(0,229,204,.09),transparent 55%),var(--bg)}
[data-theme=light] .hdr{background:rgba(240,245,255,.95);border-color:rgba(8,12,42,.08)}
.theme-btn{width:34px;height:34px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all .2s;flex-shrink:0;line-height:1}
.theme-btn:hover{border-color:rgba(255,196,0,.45);background:rgba(255,196,0,.1)}
[data-theme=light] .sticky-bar{background:rgba(240,245,255,.95);border-color:rgba(8,12,42,.06)}
[data-theme=light] .search-input{background:rgba(255,255,255,.6);border-color:rgba(8,12,42,.12)}
</style>
</head>
<body>
<div class="bg"></div>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t">📖 Dicționar</div>
  <div class="hdr-cnt" id="hdr-cnt">…</div>
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️</button>
</header>

<div class="sticky-bar">
  <div class="search-wrap">
    <div class="search-rel">
      <span class="search-ico">🔍</span>
      <input class="search-input" id="srch" type="search" placeholder="Caută un cuvânt…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>
  <div class="pills" id="pills"></div>
</div>

<main class="main">
  <div class="word-list" id="word-list"></div>
</main>

<script src="dict.js"></script>
<script>
const CAT_META = {
  'toate':     {emo:'🌍', label:'Toate'},
  'salutări':  {emo:'👋', label:'Salutări'},
  'pronume':   {emo:'🙋', label:'Pronume'},
  'verb':      {emo:'⚡', label:'Verbe'},
  'casă':      {emo:'🏠', label:'Casă'},
  'familie':   {emo:'👨‍👩‍👧', label:'Familie'},
  'mâncare':   {emo:'🍎', label:'Mâncare'},
  'transport': {emo:'🚗', label:'Transport'},
  'muncă':     {emo:'💼', label:'Muncă'},
  'călătorii': {emo:'✈️', label:'Călătorii'},
  'adjectiv':  {emo:'💬', label:'Adjective'},
  'timp':      {emo:'⏰', label:'Timp'},
  'culoare':   {emo:'🎨', label:'Culori'},
  'număr':     {emo:'🔢', label:'Numere'},
};
const ORDER = ['toate','salutări','pronume','verb','casă','familie','mâncare','transport','muncă','călătorii','adjectiv','timp','culoare','număr'];

let activeCat = 'toate';
let searchQ = '';
const learned = new Set(JSON.parse(localStorage.getItem('EZH_DICT_LEARNED') || '[]'));

function saveLearned() {
  localStorage.setItem('EZH_DICT_LEARNED', JSON.stringify([...learned]));
}

function buildPills() {
  const p = document.getElementById('pills');
  ORDER.forEach(cat => {
    const m = CAT_META[cat] || {emo:'', label:cat};
    const div = document.createElement('div');
    div.className = 'pill' + (cat === activeCat ? ' active' : '');
    div.textContent = m.emo + ' ' + m.label;
    div.onclick = () => { activeCat = cat; render(); refreshPills(); };
    p.appendChild(div);
  });
}

function refreshPills() {
  const divs = document.getElementById('pills').children;
  ORDER.forEach((cat, i) => {
    divs[i].className = 'pill' + (cat === activeCat ? ' active' : '');
  });
}

function getWords() {
  let words = activeCat === 'toate' ? DICT.all : DICT.by(activeCat);
  if (searchQ) {
    words = words.filter(w =>
      w.en.toLowerCase().includes(searchQ) ||
      w.ro.toLowerCase().includes(searchQ)
    );
  }
  return words;
}

function makeIco(w) {
  if (w.hex) {
    return `<div class="wico is-color" style="background:${w.hex}"></div>`;
  }
  if (w.n != null) {
    return `<div class="wico"><span class="wnum">${w.n}</span></div>`;
  }
  return `<div class="wico">${w.e || '📖'}</div>`;
}

let activeSpeakCard = null;
function speakWord(w, cardEl) {
  if (activeSpeakCard) activeSpeakCard.classList.remove('speaking');
  cardEl.classList.add('speaking');
  activeSpeakCard = cardEl;
  const u = new SpeechSynthesisUtterance(w.en);
  u.lang = 'en-US'; u.rate = 0.78;
  u.onend = () => { cardEl.classList.remove('speaking'); if (activeSpeakCard === cardEl) activeSpeakCard = null; };
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function toggleLearned(key, cardEl) {
  if (learned.has(key)) { learned.delete(key); } else { learned.add(key); }
  saveLearned();
  const isNow = learned.has(key);
  cardEl.classList.toggle('learned', isNow);
  cardEl.querySelector('.wcheck').textContent = isNow ? '✓' : '';
}

function render() {
  const words = getWords();
  const list = document.getElementById('word-list');
  const total = activeCat === 'toate' ? DICT.all.length : DICT.by(activeCat).length;
  document.getElementById('hdr-cnt').textContent = words.length === total
    ? words.length + ' cuv'
    : words.length + ' / ' + total;

  if (!words.length) {
    list.innerHTML = `<div class="empty"><div class="empty-emo">🔎</div><div class="empty-t">Niciun rezultat</div><div class="empty-s">Încearcă altă căutare</div></div>`;
    return;
  }

  list.innerHTML = '';
  words.forEach(w => {
    const key = w.en;
    const isLearned = learned.has(key);
    const card = document.createElement('div');
    card.className = 'wcard' + (isLearned ? ' learned' : '');
    card.innerHTML =
      makeIco(w) +
      `<div class="winfo">
        <div class="wen">${w.en}</div>
        <div class="wph">${w.ph}</div>
        <div class="wro">${w.ro}</div>
      </div>
      <div class="wright">
        <div class="wsound">🔊</div>
        <div class="wcheck">${isLearned ? '✓' : ''}</div>
      </div>`;

    card.querySelector('.wcheck').addEventListener('click', e => {
      e.stopPropagation();
      toggleLearned(key, card);
    });

    card.addEventListener('click', () => speakWord(w, card));
    list.appendChild(card);
  });
}

document.getElementById('srch').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase();
  render();
});

buildPills();
render();
</script>
<script src="theme.js"></script>
</body>
</html>
