<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sunete Dificile · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050818;--blue:#00b4ff;--purple:#8b5cf6;--teal:#00e5cc;--frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);--glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09);}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 65% 50% at 15% 15%,rgba(139,92,246,.18),transparent 65%),radial-gradient(ellipse 55% 45% at 85% 75%,rgba(0,180,255,.15),transparent 60%),#050818}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:13px 20px;display:flex;align-items:center;gap:12px;background:rgba(5,8,24,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);transition:all .2s;flex-shrink:0}
.back:hover{border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.1)}
.hdr-t{font-size:14px;font-weight:700;flex:1}
.main{padding:78px 20px 48px;position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:14px}
.page-title{width:100%;max-width:480px;text-align:center;padding:24px 0 8px}
.page-title h1{font-size:clamp(22px,6vw,34px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(130deg,var(--purple),#ff6ad5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.page-title p{font-size:13px;color:var(--frost2);line-height:1.55}
.scard{width:100%;max-width:480px;background:var(--glass);border:1px solid var(--border);border-radius:24px;overflow:hidden;backdrop-filter:blur(20px);transition:border-color .25s}
.scard:hover{border-color:rgba(139,92,246,.25)}
.scard-head{padding:20px 22px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none}
.sound-badge{font-size:22px;font-weight:900;letter-spacing:.04em;min-width:68px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(139,92,246,.08));border:1px solid rgba(139,92,246,.30);color:var(--purple);text-shadow:0 0 14px rgba(139,92,246,.5);flex-shrink:0}
.sinfo{flex:1}
.stitle{font-size:16px;font-weight:700;margin-bottom:3px;text-transform:uppercase}
.ssub{font-size:12.5px;color:var(--frost2);text-transform:uppercase}
.toggle{font-size:20px;transition:transform .3s;color:var(--frost3)}
.scard.open .toggle{transform:rotate(180deg)}
.sbody{display:none;padding:0 22px 22px}
.scard.open .sbody{display:block}
.tip-box{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.18);border-radius:16px;padding:14px 16px;margin-bottom:16px}
.tip-lbl{font-size:10px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--purple);opacity:.75;margin-bottom:6px}
.tip-text{font-size:13px;color:var(--frost);line-height:1.6;text-transform:uppercase}
.mouth-tip{font-size:12px;color:var(--frost2);margin-top:6px;line-height:1.5;font-style:italic;text-transform:uppercase}
.ex-lbl{font-size:10px;font-weight:700;letter-spacing:.20em;text-transform:uppercase;color:var(--frost3);margin-bottom:10px}
.ex-list{display:flex;flex-direction:column;gap:8px}
.ex-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;transition:all .2s}
.ex-row:hover{background:rgba(139,92,246,.08);border-color:rgba(139,92,246,.25)}
.ex-word{font-size:15px;font-weight:700;flex:1}
.ex-ph{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:.04em}
.ex-ro{font-size:12px;color:var(--frost2);margin-left:auto;text-transform:uppercase}
.play-ico{font-size:18px;flex-shrink:0;opacity:.6}
.ex-row:hover .play-ico{opacity:1}
.warn-box{background:rgba(255,160,0,.07);border:1px solid rgba(255,160,0,.22);border-radius:14px;padding:12px 14px;margin-top:12px;font-size:12px;color:rgba(255,200,100,.85);line-height:1.55;text-transform:uppercase}
.tip-box,.warn-box{cursor:pointer;position:relative}
.tip-box::after,.warn-box::after{content:'🔍';position:absolute;top:10px;right:12px;font-size:14px;opacity:.45;pointer-events:none}
/* modal */
.zmodal{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;padding:24px}
.zmodal.show{display:flex}
.zoverlay{position:absolute;inset:0;background:rgba(5,8,24,.88);backdrop-filter:blur(12px)}
.zbox{position:relative;z-index:1;width:100%;max-width:480px;border-radius:26px;padding:30px 26px 26px;border:1px solid var(--border);background:rgba(20,22,48,.97)}
.zbox.tip{border-color:rgba(139,92,246,.35)}
.zbox.warn{border-color:rgba(255,160,0,.35)}
.zlbl{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px}
.zbox.tip .zlbl{color:var(--purple)}
.zbox.warn .zlbl{color:rgba(255,200,100,.85)}
.zmain{font-size:20px;font-weight:600;line-height:1.55;color:var(--frost);text-transform:uppercase;margin-bottom:14px}
.zsub{font-size:16px;color:var(--frost2);line-height:1.55;font-style:italic;text-transform:uppercase}
.zbox.warn .zmain{color:rgba(255,200,100,.95);font-size:20px}
.zclose{display:block;width:100%;margin-top:22px;padding:14px;border-radius:14px;border:1px solid var(--border);background:var(--glass);color:var(--frost2);font-size:14px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;text-align:center}
</style>
</head>
<body>
<div class="bg"></div>
<div class="zmodal" id="zmodal" onclick="closePopup(event)">
  <div class="zoverlay"></div>
  <div class="zbox" id="zbox">
    <div class="zlbl" id="zlbl"></div>
    <div class="zmain" id="zmain"></div>
    <div class="zsub" id="zsub"></div>
    <button class="zclose" onclick="closePopup()">Închide</button>
  </div>
</div>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t" id="hdr-t">Sunete Dificile</div>
</header>
<main class="main">
  <div class="page-title">
    <h1 id="pg-h1">Sunete Dificile</h1>

  </div>
  <div id="cards-wrap"></div>
</main>
<script>
const SOUNDS=[
  {id:'th-v',badge:'TH',title_ro:'TH sonor',title_en:'Voiced TH',sub_ro:'"The", "this", "that"',sub_en:'"The", "this", "that"',
   tip_ro:'Pune vârful limbii ÎNTRE dinți și vibra-ți corzile vocale. Ca "z" dar cu limba ieșită între dinți.',tip_en:'Put tongue TIP BETWEEN teeth and vibrate your voice. Like "z" but with tongue between teeth.',
   mouth_ro:'Limbă între dinți, vibrând ușor. Simți vibrația la gât.',mouth_en:'Tongue between teeth, vibrating. Feel the vibration in your throat.',
   warn_ro:'⚠️ Nu spune "de" sau "ze"! Limba TREBUIE să iasă între dinți.',warn_en:'⚠️ Do not say "de" or "ze"! Tongue MUST go between teeth.',
   ex:[{w:'The',ph:'ĐĂ',ro:'Articolul'},{w:'This',ph:'ĐIS',ro:'Acesta'},{w:'That',ph:'ĐAT',ro:'Acela'},{w:'Mother',ph:'MAĐER',ro:'Mamă'},{w:'Brother',ph:'BRAĐER',ro:'Frate'}]},
  {id:'th-u',badge:'TH',title_ro:'TH surd',title_en:'Voiceless TH',sub_ro:'"Think", "three", "thank"',sub_en:'"Think", "three", "thank"',
   tip_ro:'La fel ca TH sonor, dar fără vibrație vocală. Sufli aer printre dinți și limbă.',tip_en:'Same as voiced TH, but without vocal vibration. Blow air between teeth and tongue.',
   mouth_ro:'Limbă între dinți, sufli aer rece. Nu simți vibrație.',mouth_en:'Tongue between teeth, blow cool air. No vibration.',
   warn_ro:'⚠️ Nu spune "t", "s" sau "f"! Limba între dinți!',warn_en:'⚠️ Do not say "t", "s" or "f"! Tongue between teeth!',
   ex:[{w:'Think',ph:'ΘINK',ro:'A gândi'},{w:'Three',ph:'ΘRII',ro:'Trei'},{w:'Thank',ph:'ΘANK',ro:'Mulțumesc'},{w:'Tooth',ph:'TUUΘ',ro:'Dinte'},{w:'Bath',ph:'BAΘ',ro:'Baie'}]},
  {id:'sh',badge:'SH',title_ro:'SH',title_en:'SH sound',sub_ro:'"She", "fish", "wash"',sub_en:'"She", "fish", "wash"',
   tip_ro:'Ca "ș" din română! Este același sunet. Buzele ușor înainte.',tip_en:'Like Romanian "ș"! Same sound. Lips slightly forward.',
   mouth_ro:'Buzele se rotunjesc ușor și se apropie. Limba în spate.',mouth_en:'Lips round slightly and come forward. Tongue is back.',
   warn_ro:'✅ Ești norocos! "SH" în engleză = "Ș" în română.',warn_en:'✅ You are lucky! English "SH" = Romanian "Ș".',
   ex:[{w:'She',ph:'ȘI',ro:'Ea'},{w:'Fish',ph:'FIȘ',ro:'Pește'},{w:'Wash',ph:'UOȘ',ro:'A spăla'},{w:'English',ph:'INGLIȘ',ro:'Engleză'},{w:'Shower',ph:'ȘAUER',ro:'Duș'}]},
  {id:'ch',badge:'CH',title_ro:'CH',title_en:'CH sound',sub_ro:'"Chair", "much", "beach"',sub_en:'"Chair", "much", "beach"',
   tip_ro:'Ca "ci" sau "ce" din română — același sunet! "Chair" = "CEIR", "beach" = "BIICI".',tip_en:'Like Romanian "ci" or "ce" — same sound! "Chair" = "CHEIR".',
   mouth_ro:'Limba sus și în față, aerul iese brusc.',mouth_en:'Tongue up and forward, air bursts out.',
   warn_ro:'✅ Norocos din nou! "CH" englez = "C" înaintea lui "i/e" în română.',warn_en:'✅ Lucky again! English "CH" = Romanian "C" before "i/e".',
   ex:[{w:'Chair',ph:'CEIR',ro:'Scaun'},{w:'Beach',ph:'BIICI',ro:'Plajă'},{w:'Watch',ph:'UOCI',ro:'Ceas'},{w:'Cheese',ph:'CIIZ',ro:'Brânză'},{w:'Kitchen',ph:'KICEN',ro:'Bucătărie'}]},
  {id:'r',badge:'R',title_ro:'R englezesc',title_en:'English R',sub_ro:'Nu-l rula! "Rain", "red", "right"',sub_en:'Never roll it! "Rain", "red", "right"',
   tip_ro:'NICIODATĂ nu rula R-ul ca în română! Ridică ușor vârful limbii spre cer, fără să atingi nimic. Buzele se rotunjesc puțin.',tip_en:'NEVER roll the R like in Romanian! Lift tongue tip slightly without touching palate. Lips round slightly.',
   mouth_ro:'Vârful limbii sus, fără contact cu palatul. Ca și cum vrei să spui "r" dar nu îl pronunți complet.',mouth_en:'Tongue tip up, no contact with palate. As if starting to say "r" but not completing it.',
   warn_ro:'⚠️ R-ul rulat românesc sună foarte ciudat în engleză. Acest sunet necesită practică!',warn_en:'⚠️ The rolled Romanian R sounds very foreign in English. This sound requires practice!',
   ex:[{w:'Rain',ph:'REIN',ro:'Ploaie'},{w:'Red',ph:'RED',ro:'Roșu'},{w:'Right',ph:'RAIT',ro:'Drept'},{w:'Real',ph:'RIIL',ro:'Real'},{w:'Room',ph:'RUUM',ro:'Cameră'}]},
  {id:'w',badge:'W',title_ro:'W',title_en:'W sound',sub_ro:'"Water", "world", "want"',sub_en:'"Water", "world", "want"',
   tip_ro:'Buzele rotunde și proiectate în față ca la "u", apoi deschizi rapid spre vocala următoare. Nu este "v"!',tip_en:'Lips round and pushed forward like "oo", then quickly open into the next vowel. NOT "v"!',
   mouth_ro:'Buzele ca pentru "u", apoi deschis rapid. Ca un sărut în aer.',mouth_en:'Lips like for "oo", then open quickly. Like blowing a kiss.',
   warn_ro:'⚠️ "W" ≠ "V"! "Wine" (vin de struguri) ≠ "vine" (el vine). Sunt sunete diferite!',warn_en:'⚠️ "W" ≠ "V"! "Wine" (grape wine) ≠ "vine" (a vine). They are different sounds!',
   ex:[{w:'Water',ph:'UOTER',ro:'Apă'},{w:'World',ph:'UORLD',ro:'Lume'},{w:'Want',ph:'UONT',ro:'A vrea'},{w:'Window',ph:'UINDOU',ro:'Fereastră'},{w:'Wow',ph:'UAU',ro:'Uau!'}]}
];
function build(){
  const wrap=document.getElementById('cards-wrap');
  wrap.style.cssText='width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px';
  wrap.innerHTML='';
  SOUNDS.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='scard';
    card.innerHTML=`
      <div class="scard-head" onclick="toggle(${i})">
        <div class="sound-badge">${s.badge}</div>
        <div class="sinfo">
          <div class="stitle">${s.title_ro}</div>
          <div class="ssub">${s.sub_ro}</div>
        </div>
        <div class="toggle">▾</div>
      </div>
      <div class="sbody">
        <div class="tip-box" onclick="event.stopPropagation();showPopup(${i},'tip')">
          <div class="tip-lbl">Cum pronunți</div>
          <div class="tip-text">${s.tip_ro}</div>
          <div class="mouth-tip">${s.mouth_ro}</div>
        </div>
        <div class="ex-lbl">Exemple</div>
        <div class="ex-list">
          ${s.ex.map(x=>`<div class="ex-row" onclick="sw('${x.w}')"><span class="play-ico">🔊</span><span class="ex-word">${x.w}</span><span class="ex-ph">${x.ph}</span><span class="ex-ro">${x.ro}</span></div>`).join('')}
        </div>
        <div class="warn-box" onclick="event.stopPropagation();showPopup(${i},'warn')">${s.warn_ro}</div>
      </div>`;
    card.id='sc-'+i;
    wrap.appendChild(card);
  });
}
window.toggle=function(i){
  const c=document.getElementById('sc-'+i);
  c.classList.toggle('open');
};
window.showPopup=function(i,type){
  const s=SOUNDS[i];
  const isWarn=type==='warn';
  document.getElementById('zlbl').textContent=isWarn?'Atenție':'Cum pronunți';
  document.getElementById('zmain').textContent=isWarn?s.warn_ro:s.tip_ro;
  const zs=document.getElementById('zsub');
  if(!isWarn&&s.mouth_ro){zs.textContent=s.mouth_ro;zs.style.display='block';}
  else{zs.style.display='none';}
  document.getElementById('zbox').className='zbox '+type;
  document.getElementById('zmodal').classList.add('show');
  document.body.style.overflow='hidden';
};
window.closePopup=function(e){
  if(e&&!e.target.closest('.zoverlay')&&e.target.id!=='zmodal')return;
  document.getElementById('zmodal').classList.remove('show');
  document.body.style.overflow='';
};
let _v=null;
function _gv(){
  if(_v)return _v;
  const vv=speechSynthesis.getVoices();
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Microsoft Guy Online (Natural) - English (United States)','Microsoft Zira - English (United States)','Microsoft David - English (United States)','Samantha','Karen','Daniel'];
  for(const n of pref){const v=vv.find(x=>x.name===n);if(v){_v=v;return v;}}
  _v=vv.find(x=>x.lang==='en-US')||vv.find(x=>x.lang.startsWith('en'))||null;
  return _v;
}
speechSynthesis.onvoiceschanged=()=>{_v=null;};
function sw(w){const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=.68;u.pitch=1;const v=_gv();if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);}
build();
</script>
</body>
</html>
