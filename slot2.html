<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Slot Machine 2 Rele · English Zero→Hero</title>
<meta name="theme-color" content="#050818">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050818;--blue:#00b4ff;--green:#00e676;--purple:#8b5cf6;--gold:#ffc400;
  --frost:rgba(255,255,255,.92);--frost2:rgba(255,255,255,.55);--frost3:rgba(255,255,255,.18);
  --glass:rgba(255,255,255,.06);--border:rgba(255,255,255,.09)}
html,body{min-height:100%;background:var(--bg);color:var(--frost);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 80% 60% at 10% 5%,rgba(0,180,255,.28),transparent 60%),
  radial-gradient(ellipse 60% 50% at 90% 90%,rgba(0,230,118,.18),transparent 55%),#050818}
#cvs{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.55}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 18px;display:flex;align-items:center;gap:11px;background:rgba(5,8,24,.9);backdrop-filter:blur(22px);border-bottom:1px solid var(--border)}
.back{width:36px;height:36px;border-radius:11px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:16px;text-decoration:none;color:var(--frost);flex-shrink:0;transition:all .2s}
.back:hover{border-color:rgba(0,180,255,.5);background:rgba(0,180,255,.12)}
.hdr-t{font-size:13px;font-weight:700;flex:1}
.slot-nav{display:flex;gap:3px}
.snav{width:26px;height:26px;border-radius:8px;border:1px solid var(--border);background:var(--glass);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;text-decoration:none;color:var(--frost2);transition:all .2s}
.snav.active{background:rgba(0,180,255,.18);border-color:rgba(0,180,255,.5);color:var(--blue)}
.snav:hover{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.4);color:var(--purple)}
.app{position:relative;z-index:10;min-height:100dvh;padding:72px 8px 52px;display:flex;flex-direction:column;align-items:center;gap:14px}
.pg-title{text-align:center;width:100%;max-width:480px;padding:6px 0 2px}
.pg-title h1{font-size:clamp(20px,5.5vw,30px);font-weight:900;letter-spacing:-.025em;background:linear-gradient(130deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.pg-title p{font-size:11px;color:var(--frost2);text-transform:uppercase;letter-spacing:.16em}
.tense-tabs{width:100%;max-width:480px;display:flex;gap:6px}
.ttab{flex:1;padding:10px 3px;border-radius:13px;border:1.5px solid var(--border);background:var(--glass);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--frost2);font-family:inherit;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(12px);line-height:1.3;text-align:center}
.ttab.active-present{background:rgba(0,180,255,.15);border-color:rgba(0,180,255,.5);color:var(--blue);box-shadow:0 0 18px rgba(0,180,255,.2)}
.ttab.active-past{background:rgba(255,196,0,.15);border-color:rgba(255,196,0,.5);color:var(--gold);box-shadow:0 0 18px rgba(255,196,0,.2)}
.ttab.active-future{background:rgba(139,92,246,.15);border-color:rgba(139,92,246,.5);color:var(--purple);box-shadow:0 0 18px rgba(139,92,246,.2)}
.reels{width:100%;max-width:480px;display:flex;gap:12px}
.reel{flex:1;min-height:180px;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 8px 22px;cursor:pointer;user-select:none;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:transform .13s;backdrop-filter:blur(18px)}
.reel::before{content:'';position:absolute;inset:0;background:linear-gradient(155deg,rgba(255,255,255,.09),transparent 52%);pointer-events:none;z-index:1}
.reel:active{transform:scale(.93)}
.reel-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:5px}
.reel.spin .reel-inner{animation:rtick .1s linear infinite}
@keyframes rtick{0%{transform:translateY(0) scale(1);filter:blur(0)}44%{transform:translateY(-8px) scale(.95);filter:blur(3px)}56%{transform:translateY(8px) scale(.95);filter:blur(3px)}100%{transform:translateY(0) scale(1);filter:blur(0)}}
.emo{font-size:clamp(30px,8vw,42px);line-height:1}
.rword{font-size:clamp(11px,3.2vw,17px);font-weight:900;letter-spacing:.05em;text-transform:uppercase;text-align:center;line-height:1.15}
.rro{font-size:clamp(9px,2.2vw,11px);font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.72;text-align:center}
.rlbl{position:absolute;bottom:5px;font-size:7px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;opacity:.42;z-index:2}
.r0{background:linear-gradient(155deg,rgba(0,180,255,.17),rgba(0,180,255,.05));border:1.5px solid rgba(0,180,255,.42);box-shadow:0 0 22px rgba(0,180,255,.16),inset 0 1px 0 rgba(0,180,255,.1)}
.r0 .rword{color:var(--blue)}.r0 .rlbl{color:rgba(0,180,255,.7)}
.r2{background:linear-gradient(155deg,rgba(0,230,118,.17),rgba(0,230,118,.05));border:1.5px solid rgba(0,230,118,.42);box-shadow:0 0 22px rgba(0,230,118,.16),inset 0 1px 0 rgba(0,230,118,.1)}
.r2 .rword{color:var(--green)}.r2 .rlbl{color:rgba(0,230,118,.7)}
.hint{font-size:10px;color:var(--frost3);text-align:center;letter-spacing:.1em;text-transform:uppercase;width:100%;max-width:480px}
.sent-card{width:100%;max-width:480px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:16px 18px;backdrop-filter:blur(22px);display:flex;flex-direction:column;gap:9px}
.sent-top{display:flex;align-items:center;gap:10px}
.play-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--glass);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent}
.play-btn:hover{background:rgba(0,180,255,.15);border-color:rgba(0,180,255,.4)}
.sent-en{font-size:clamp(16px,4.5vw,24px);font-weight:900;display:flex;flex-wrap:wrap;gap:6px;align-items:baseline;line-height:1.3;flex:1}
.ws{color:var(--blue)}.wa{color:var(--gold)}.wv{color:var(--green)}.wd{color:var(--frost3)}.wn{color:#ff4060;text-shadow:0 0 10px rgba(255,64,96,.5)}
.sent-ro{font-size:13px;font-weight:700;color:var(--frost2);text-transform:uppercase;letter-spacing:.06em;padding-left:48px}
.sent-ph{font-size:12px;font-weight:700;letter-spacing:.07em;display:flex;flex-wrap:wrap;gap:5px;padding-left:48px;opacity:.9}
.sent-rule{font-size:9.5px;color:var(--frost3);text-transform:uppercase;letter-spacing:.12em;padding-left:48px}
.legend{width:100%;max-width:480px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.leg{border-radius:11px;padding:7px 4px;text-align:center;font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border);background:var(--glass)}
.lb{color:var(--blue);border-color:rgba(0,180,255,.22)}.lg{color:var(--green);border-color:rgba(0,230,118,.22)}
.spin-btn{width:100%;max-width:480px;padding:19px;border:none;border-radius:22px;cursor:pointer;font-family:'Inter',-apple-system,sans-serif;font-size:clamp(15px,4vw,19px);font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,#00b4ff,#00e676 50%,#00b4ff);background-size:300% 300%;animation:ga 4s ease infinite;box-shadow:0 8px 32px rgba(0,180,255,.4),inset 0 1px 0 rgba(255,255,255,.22);position:relative;overflow:hidden;transition:transform .15s;-webkit-tap-highlight-color:transparent}
.spin-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.22),transparent 55%);pointer-events:none}
.spin-btn:active{transform:scale(.97)}
.spin-btn.go{animation:ga .6s ease infinite;box-shadow:0 12px 48px rgba(0,180,255,.65)}
@keyframes ga{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.neg-toggle{width:100%;max-width:480px;padding:12px 16px;border-radius:16px;border:1.5px solid var(--border);background:var(--glass);font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--frost2);transition:all .25s;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(12px)}
.neg-toggle.on{background:rgba(255,64,96,.12);border-color:rgba(255,64,96,.5);color:#ff4060;box-shadow:0 0 22px rgba(255,64,96,.25)}
.flash{position:fixed;inset:0;z-index:300;pointer-events:none;animation:wf .7s ease forwards}
@keyframes wf{0%{background:rgba(0,180,255,0)}20%{background:rgba(0,180,255,.18)}50%{background:rgba(0,230,118,.1)}100%{background:rgba(0,0,0,0)}}
</style>
</head>
<body>
<div class="bg"></div>
<canvas id="cvs"></canvas>
<header class="hdr">
  <a class="back" href="index.html">←</a>
  <div class="hdr-t">🎰 Slot Machine</div>
  <nav class="slot-nav">
    <a class="snav active" href="slot2.html">2</a>
    <a class="snav" href="slot3.html">3</a>
    <a class="snav" href="slot.html">4</a>
    <a class="snav" href="slot5.html">5</a>
    <a class="snav" href="slot6.html">6</a>
    <a class="snav" href="slot7.html">7</a>
  </nav>
</header>
<main class="app">
  <div class="pg-title">
    <h1>🎰 2 Rele</h1>
    <p>Subiect + Verb · Tap · Swipe ↑↓</p>
  </div>

  <div class="tense-tabs">
    <button class="ttab active-present" id="tab-pres" onclick="setTense('present')">⏱<br>Prezent</button>
    <button class="ttab" id="tab-past" onclick="setTense('past')">⏮<br>Trecut</button>
    <button class="ttab" id="tab-fut" onclick="setTense('future')">⏭<br>Viitor</button>
  </div>

  <div class="reels">
    <div class="reel r0" id="r0" onclick="step(0)" ontouchstart="ts(event,0)" ontouchend="te(event,0)">
      <div class="reel-inner" id="ri0"><div class="emo" id="e0">🙋</div><div class="rword" id="w0">I</div><div class="rro" id="t0">EU</div></div>
      <div class="rlbl">SUBIECT</div>
    </div>
    <div class="reel r2" id="r1" onclick="step(1)" ontouchstart="ts(event,1)" ontouchend="te(event,1)">
      <div class="reel-inner" id="ri1"><div class="emo" id="e1">🍽️</div><div class="rword" id="w1">EAT</div><div class="rro" id="t1">A MÂNCA</div></div>
      <div class="rlbl" id="lbl1">VERB</div>
    </div>
  </div>

  <button class="neg-toggle" id="negBtn" onclick="toggleNeg()">✅ POZITIV</button>

  <div class="hint">▲ Swipe pe rele · Tap negație pentru on/off ▼</div>

  <div class="sent-card">
    <div class="sent-top">
      <button class="play-btn" onclick="speak()">🔊</button>
      <div class="sent-en" id="sent-en">
        <span class="ws">I</span><span class="wv">eat</span><span class="wd">.</span>
      </div>
    </div>
    <div class="sent-ph" id="sent-ph"><span class="ws">AI</span><span class="wv">IIT</span><span class="wd">.</span></div>
    <div class="sent-ro" id="sent-ro">EU MĂNÂNC.</div>
    <div class="sent-rule" id="sent-rule">SUBIECT + VERB</div>
  </div>

  <div class="legend">
    <div class="leg lb">🔵 Subiect</div>
    <div class="leg lg">🟢 Verb</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="megaSpin()">🎰 MEGA SPIN 🎰</button>
</main>
<script>
const SUBS=[
  {w:'I',    ro:'Eu',     e:'🙋', fi:0, is3:false, ph:'AI'},
  {w:'You',  ro:'Tu',     e:'👤', fi:1, is3:false, ph:'IU'},
  {w:'We',   ro:'Noi',    e:'👥', fi:3, is3:false, ph:'UII'},
  {w:'They', ro:'Ei/Ele', e:'👫', fi:5, is3:false, ph:'ĐEI'},
  {w:'He',   ro:'El',     e:'👨', fi:2, is3:true,  ph:'HI'},
  {w:'She',  ro:'Ea',     e:'👩', fi:2, is3:true,  ph:'ȘI'},
  {w:'It',   ro:'El/Ea',  e:'🤖', fi:2, is3:true,  ph:'IT'},
];
const VERBS=[
  {w:'eat',   v3:'eats',   past:'ate',     e:'🍽️', ro:'a mânca',   ph:'IIT',   ph3:'IITS',  ph_past:'EIT',   rf:['mănânc','mănânci','mănâncă','mâncăm','mâncați','mănâncă'],   past_part:'mâncat',  rof:'mânca'},
  {w:'drink', v3:'drinks', past:'drank',   e:'🥤', ro:'a bea',      ph:'DRINK', ph3:'DRINKS',ph_past:'DRENK', rf:['beau','bei','bea','bem','beți','beau'],                         past_part:'băut',    rof:'bea'},
  {w:'like',  v3:'likes',  past:'liked',   e:'❤️', ro:'a-i plăcea',ph:'LAIK',  ph3:'LAIKS', ph_past:'LAIKT', rf:['îmi place','îți place','îi place','ne place','vă place','le place'], past_part:'plăcut', rof:'plăcea'},
  {w:'love',  v3:'loves',  past:'loved',   e:'💕', ro:'a iubi',     ph:'LAV',   ph3:'LAVZ',  ph_past:'LAVD',  rf:['iubesc','iubești','iubește','iubim','iubiți','iubesc'],         past_part:'iubit',   rof:'iubi'},
  {w:'study', v3:'studies',past:'studied', e:'📚', ro:'a studia',   ph:'STADI', ph3:'STADIZ',ph_past:'STADID',rf:['studiez','studiezi','studiază','studiem','studiați','studiază'], past_part:'studiat', rof:'studia'},
  {w:'read',  v3:'reads',  past:'read',    e:'📖', ro:'a citi',     ph:'RIID',  ph3:'RIIDZ', ph_past:'RED',   rf:['citesc','citești','citește','citim','citiți','citesc'],         past_part:'citit',   rof:'citi'},
  {w:'watch', v3:'watches',past:'watched', e:'📺', ro:'a urmări',   ph:'UOCI',  ph3:'UOCIZ', ph_past:'UOCIT', rf:['urmăresc','urmărești','urmărește','urmărim','urmăriți','urmăresc'], past_part:'urmărit', rof:'urmări'},
  {w:'play',  v3:'plays',  past:'played',  e:'🎮', ro:'a se juca',  ph:'PLEI',  ph3:'PLEIZ', ph_past:'PLEID', rf:['mă joc','te joci','se joacă','ne jucăm','vă jucați','se joacă'], past_part:'jucat',  rof:'juca'},
  {w:'go',    v3:'goes',   past:'went',    e:'🚶', ro:'a merge',    ph:'GOU',   ph3:'GOUZ',  ph_past:'UENT',  rf:['merg','mergi','merge','mergem','mergeți','merg'],               past_part:'mers',    rof:'merge'},
  {w:'speak', v3:'speaks', past:'spoke',   e:'🗣️', ro:'a vorbi',    ph:'SPIIK', ph3:'SPIIKS',ph_past:'SPOUK', rf:['vorbesc','vorbești','vorbește','vorbim','vorbiți','vorbesc'],   past_part:'vorbit',  rof:'vorbi'},
  {w:'cook',  v3:'cooks',  past:'cooked',  e:'👨‍🍳',ro:'a găti',     ph:'KUK',   ph3:'KUKS',  ph_past:'KUKT',  rf:['gătesc','gătești','gătește','gătim','gătiți','gătesc'],         past_part:'gătit',   rof:'găti'},
  {w:'sleep', v3:'sleeps', past:'slept',   e:'😴', ro:'a dormi',    ph:'SLIIP', ph3:'SLIIPS',ph_past:'SLEPT', rf:['dorm','dormi','doarme','dormim','dormiți','dorm'],               past_part:'dormit',  rof:'dormi'},
  {w:'work',  v3:'works',  past:'worked',  e:'💼', ro:'a lucra',    ph:'UORK',  ph3:'UORKS', ph_past:'UORKT', rf:['lucrez','lucrezi','lucrează','lucrăm','lucrați','lucrează'],     past_part:'lucrat',  rof:'lucra'},
  {w:'learn', v3:'learns', past:'learned', e:'🧠', ro:'a învăța',   ph:'LERN',  ph3:'LERNZ', ph_past:'LERND', rf:['învăț','înveți','învață','învățăm','învățați','învață'],         past_part:'învățat', rof:'învăța'},
  {w:'buy',   v3:'buys',   past:'bought',  e:'🛍️', ro:'a cumpăra',  ph:'BAI',   ph3:'BAIZ',  ph_past:'BOT',   rf:['cumpăr','cumperi','cumpără','cumpărăm','cumpărați','cumpără'],  past_part:'cumpărat',rof:'cumpăra'},
];
const PAST_AUX=['am','ai','a','am','ați','au'];
const FUT_AUX=['voi','vei','va','vom','veți','vor'];

let idx=[0,0];
let tense='present';
let neg=false;
let busy=false;
const tY={};

function $(id){return document.getElementById(id);}

function setTense(t){
  tense=t;
  [['pres','present'],['past','past'],['fut','future']].forEach(([id,tt])=>{
    $('tab-'+id).className='ttab'+(tense===tt?' active-'+tt:'');
  });
  render();
}

function toggleNeg(){
  neg=!neg;
  const btn=$('negBtn');
  btn.classList.toggle('on',neg);
  btn.textContent=neg?'🚫 NEGATIV':'✅ POZITIV';
  render();
}

function render(){
  const s=SUBS[idx[0]],v=VERBS[idx[1]];
  $('e0').textContent=s.e; $('w0').textContent=s.w.toUpperCase(); $('t0').textContent=s.ro.toUpperCase();
  $('e1').textContent=v.e; $('t1').textContent=v.ro.toUpperCase();
  let verbW,lbl;
  if(tense==='present'){verbW=neg?v.w:(s.is3?v.v3:v.w);lbl='VERB';}
  else if(tense==='past'){verbW=neg?v.w:v.past;lbl=neg?'VERB':'TRECUT';}
  else{verbW=v.w;lbl='VERB';}
  $('w1').textContent=verbW.toUpperCase(); $('lbl1').textContent=lbl;
  updateSent();
}

function updateSent(){
  const s=SUBS[idx[0]],v=VERBS[idx[1]];
  const en=$('sent-en');en.innerHTML='';
  const ph=$('sent-ph');ph.innerHTML='';
  let enP,phP,ro,rule;
  if(tense==='present'){
    const negW=s.is3?"doesn't":"don't";
    const vw=neg?v.w:(s.is3?v.v3:v.w);
    const vph=neg?v.ph:(s.is3?v.ph3:v.ph);
    enP=neg?[{c:'ws',t:s.w},{c:'wn',t:negW},{c:'wv',t:vw}]:[{c:'ws',t:s.w},{c:'wv',t:vw}];
    phP=neg?[{c:'ws',t:s.ph},{c:'wn',t:s.is3?'DAZNT':'DONT'},{c:'wv',t:vph}]:[{c:'ws',t:s.ph},{c:'wv',t:vph}];
    ro=neg?(s.ro+' nu '+v.rf[s.fi]+'.').toUpperCase():(s.ro+' '+v.rf[s.fi]+'.').toUpperCase();
    rule=neg?'SUBIECT + DON\'T/DOESN\'T + VERB':'SUBIECT + VERB';
  } else if(tense==='past'){
    enP=neg?[{c:'ws',t:s.w},{c:'wn',t:"didn't"},{c:'wv',t:v.w}]:[{c:'ws',t:s.w},{c:'wv',t:v.past}];
    phP=neg?[{c:'ws',t:s.ph},{c:'wn',t:'DIDNT'},{c:'wv',t:v.ph}]:[{c:'ws',t:s.ph},{c:'wv',t:v.ph_past}];
    ro=neg?(s.ro+' nu '+PAST_AUX[s.fi]+' '+v.past_part+'.').toUpperCase():(s.ro+' '+PAST_AUX[s.fi]+' '+v.past_part+'.').toUpperCase();
    rule=neg?'SUBIECT + DIDN\'T + VERB':'SUBIECT + VERB TRECUT';
  } else {
    enP=neg?[{c:'ws',t:s.w},{c:'wn',t:"won't"},{c:'wv',t:v.w}]:[{c:'ws',t:s.w},{c:'wa',t:'will'},{c:'wv',t:v.w}];
    phP=neg?[{c:'ws',t:s.ph},{c:'wn',t:'UONT'},{c:'wv',t:v.ph}]:[{c:'ws',t:s.ph},{c:'wa',t:'UIL'},{c:'wv',t:v.ph}];
    ro=neg?(s.ro+' nu '+FUT_AUX[s.fi]+' '+v.rof+'.').toUpperCase():(s.ro+' '+FUT_AUX[s.fi]+' '+v.rof+'.').toUpperCase();
    rule=neg?'SUBIECT + WON\'T + VERB':'SUBIECT + WILL + VERB';
  }
  enP.forEach(p=>{const sp=document.createElement('span');sp.className=p.c;sp.textContent=p.t;en.appendChild(sp);});
  en.appendChild(Object.assign(document.createElement('span'),{className:'wd',textContent:'.'}));
  phP.forEach(p=>{const sp=document.createElement('span');sp.className=p.c;sp.textContent=p.t;ph.appendChild(sp);});
  ph.appendChild(Object.assign(document.createElement('span'),{className:'wd',textContent:'.'}));
  $('sent-ro').textContent=ro;
  $('sent-rule').textContent=rule;
}

function step(r,d=1){
  if(busy)return;
  if(r===0)idx[0]=(idx[0]+d+SUBS.length)%SUBS.length;
  else idx[1]=(idx[1]+d+VERBS.length)%VERBS.length;
  render();
  sw(r===0?SUBS[idx[0]].w:VERBS[idx[1]].w);
}

function ts(e,r){tY[r]=e.touches[0].clientY;}
function te(e,r){
  if(tY[r]===undefined)return;
  const dy=e.changedTouches[0].clientY-tY[r];
  delete tY[r];
  if(Math.abs(dy)<12)return;
  e.preventDefault();
  step(r,dy<0?1:-1);
}

function spinReel(n,vals,dur,done){
  const ri=$('ri'+n),eE=$('e'+n),wE=$('w'+n);
  ri.classList.add('spin');
  let el=0;
  function tick(){
    el+=80;
    if(el>=dur){ri.classList.remove('spin');done();return;}
    const r=vals[Math.floor(Math.random()*vals.length)];
    eE.textContent=r.e;wE.textContent=r.w;
    setTimeout(tick,80+Math.floor((el/dur)*(el/dur)*180));
  }
  setTimeout(tick,80);
}

function megaSpin(){
  if(busy)return;
  busy=true;
  const btn=$('spinBtn');
  btn.classList.add('go');btn.textContent='🌀 SPINNING... 🌀';
  if(navigator.vibrate)navigator.vibrate([80,40,80,40,120]);
  const ns=[Math.floor(Math.random()*SUBS.length),Math.floor(Math.random()*VERBS.length)];
  const nn=Math.random()<0.38;
  let done=0;
  function onDone(){
    done++;
    if(done===2){
      idx=ns;neg=nn;
      $('negBtn').classList.toggle('on',neg);
      $('negBtn').textContent=neg?'🚫 NEGATIV':'✅ POZITIV';
      busy=false;btn.classList.remove('go');btn.textContent='🎰 MEGA SPIN 🎰';
      render();flash();setTimeout(speak,350);
    }
  }
  const verbVals=tense==='past'?VERBS.map(v=>({e:v.e,w:v.past.toUpperCase()})):VERBS.map(v=>({e:v.e,w:v.w.toUpperCase()}));
  spinReel(0,SUBS.map(s=>({e:s.e,w:s.w.toUpperCase()})),1400,onDone);
  spinReel(1,verbVals,1900,onDone);
}

function flash(){const d=document.createElement('div');d.className='flash';document.body.appendChild(d);setTimeout(()=>d.remove(),800);}

function speak(){
  const s=SUBS[idx[0]],v=VERBS[idx[1]];
  let words;
  if(tense==='present') words=neg?[s.w,s.is3?"doesn't":"don't",v.w]:[s.w,s.is3?v.v3:v.w];
  else if(tense==='past') words=neg?[s.w,"didn't",v.w]:[s.w,v.past];
  else words=neg?[s.w,"won't",v.w]:[s.w,'will',v.w];
  sw(words.join(' ')+'.');
}

let _v=null;
function gv(){
  if(_v)return _v;
  const vv=speechSynthesis.getVoices();
  const pref=['Google US English','Microsoft Aria Online (Natural) - English (United States)','Samantha','Karen'];
  for(const n of pref){const v=vv.find(x=>x.name===n);if(v){_v=v;return v;}}
  _v=vv.find(x=>x.lang==='en-US')||vv.find(x=>x.lang.startsWith('en'))||null;
  return _v;
}
speechSynthesis.onvoiceschanged=()=>{_v=null;};
function sw(t){const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.7;u.pitch=1;const v=gv();if(v)u.voice=v;speechSynthesis.cancel();speechSynthesis.speak(u);}

const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
let W,H,pts=[];
function initP(){
  W=cvs.width=innerWidth;H=cvs.height=innerHeight;pts=[];
  for(let i=0;i<100;i++){
    const c=['0,180,255','0,230,118','139,92,246'][Math.floor(Math.random()*3)];
    pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.3,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,c,a:Math.random()*.55+.1});
  }
}
function drawP(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${p.c},${p.a})`;ctx.fill();});
  requestAnimationFrame(drawP);
}
window.addEventListener('resize',initP);
initP();drawP();
render();
</script>
